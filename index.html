            <button style="background:none;border:none;padding:0;cursor:pointer;font-size:12px;font-weight:${stCoAtivo?700:400};color:${stCoAtivo?'#2E7D32':'#9CA3AF'};opacity:${stCoAtivo?1:.45};" onclick="confirmarMudaStatusDefeito('${r.id}',${i},'co')">Concluído</button>
          `:`<span class="pill ${d._encerrado?'status-enc':stCls[dSt]||''}">${d._encerrado?'Encerrado':stMap[dSt]||''}</span>`}
          <span style="flex:1;"></span>
          ${!isHist&&!d._encerrado?`<button class="btn-sm btn-sm-sec" style="font-size:10px;padding:3px 7px;" onclick="iniciarMesclar('${r.id}',${i})"><i class="ti ti-git-merge" style="font-size:10px;"></i> Mesclar</button>`:''}
        </div>
        <div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px;">
          ${tLabel?`<span class="pill pill-neu">${tLabel}${d.tipo==='emenda'&&d.dataEmenda?' ('+d.dataEmenda+')':''}</span>`:''}
          ${d.loc?`<span class="pill pill-neu">${d.loc}</span>`:''}
          ${d.crit?`<span class="pill pill-vn">${d.crit}</span>`:''}
        </div>
        <div style="font-size:12px;color:#374151;line-height:1.5;">${d.desc==='Sem relato'?'<span style="color:#9CA3AF;font-style:italic;">Sem relato</span>':d.desc||''}</div>
        ${d.fotos&&d.fotos.length?buildGaleriaDisplay(d.fotos,'rd-'+r.id+'-'+i):(d.foto?`<img src="${d.foto}" style="width:100%;border-radius:6px;margin-top:6px;">`:'')  }
        ${timelineH}
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;align-items:center;">
          ${!isHist&&!d._encerrado?`<button class="btn-atualizar" onclick="abrirAtualizarDefeito('${r.id}',${i})"><i class="ti ti-pencil-plus"></i> Registrar atualização</button>`:''}
          ${!isHist&&!d._encerrado?`<button class="btn-encerrar" onclick="encerrarDefeito('${r.id}',${i})" title="Encerra este defeito e move para histórico"><i class="ti ti-archive" style="font-size:11px;"></i> Encerrar</button>`:''}
          ${isHist||d._encerrado?`<button class="btn-sm btn-sm-sec" onclick="reabrirDefeito('${r.id}',${i})">↩ Reabrir</button>`:''}
        </div>
      </div>`;
    });

  const showDesc=!isRaspK&&r.tipo!=='rasp'&&r.tipo!=='defeito'&&r.tipo!=='ext-defeito';
  // Para rasp-K mostra a descrição abaixo dos pills
  const descRaspK=isRaspK?(r.desc&&r.desc!=='Sem relato'?r.desc:''):'';
  const desc=showDesc?(r.desc==='Sem relato'?'<span style="color:#9CA3AF;font-style:italic;">Sem relato</span>':r.desc||''):'';
  const titulo=isRaspK?SECAO_LABELS[r.tipo]||r.tipo:'';

  return `<div class="reg-card" id="card-${r.id}">

function buildStatusBtns(r,isHist){
  if(!isHist&&!r._encerrado){
    const st=r.campos.status==='co'?'co':'ac';
    const stAcAtivo=st!=='co';
    const stCoAtivo=st==='co';
    return`<div style="border-top:1px solid #F0F2F5;margin-top:8px;padding-top:8px;">
      <div style="display:flex;align-items:center;gap:4px;flex-wrap:wrap;">
        <span style="font-size:11px;color:#9CA3AF;font-weight:500;">Status:</span>
        <button style="background:none;border:none;padding:2px 6px;cursor:pointer;font-size:12px;font-weight:${stAcAtivo?700:400};color:${stAcAtivo?'#1565C0':'#9CA3AF'};opacity:${stAcAtivo?1:.45};border-radius:5px;" onclick="confirmarMudaStatus('${r.id}','ac')">Acompanhando</button>
        <span style="color:#D1D5DB;font-size:12px;">·</span>
        <button style="background:none;border:none;padding:2px 6px;cursor:pointer;font-size:12px;font-weight:${stCoAtivo?700:400};color:${stCoAtivo?'#2E7D32':'#9CA3AF'};opacity:${stCoAtivo?1:.45};border-radius:5px;" onclick="confirmarMudaStatus('${r.id}','co')">Concluído</button>
        <span style="flex:1;"></span>
        <button class="btn-encerrar" onclick="encerrarRegistro('${r.id}')" title="Encerra definitivamente e move para o histórico"><i class="ti ti-archive" style="font-size:11px;"></i> Encerrar</button>
      </div>
    </div>`;
  }
  return`<div class="reg-card-footer">
    <button class="btn-sm btn-sm-sec" onclick="reabrirRegistro('${r.id}')">↩ Reabrir</button>
  </div>`;
}
function confirmarMudaStatus(regId,novoStatus){
  const r=DB.registros[ativoSel].find(x=>x.id===regId);
  if(!r)return;
  const atual=r.campos.status==='co'?'co':'ac';
  if(atual===novoStatus)return;
  const labels={ac:'Acompanhando',co:'Concluído'};
  if(!confirm('Mudar status para "'+labels[novoStatus]+'"?'))return;
  r.campos.status=novoStatus;
  marcarMudanca();autoBackup();renderRelatorio();
}
function mudaStatus(regId,s){const r=DB.registros[ativoSel].find(x=>x.id===regId);if(r){r.campos.status=s;}marcarMudanca();autoBackup();renderRelatorio();}
function mudaStatusDefeito(regId,idx,s){const r=DB.registros[ativoSel].find(x=>x.id===regId);if(r&&r.campos.defeitos&&r.campos.defeitos[idx]){r.campos.defeitos[idx].status=s;}marcarMudanca();autoBackup();renderRelatorio();}
function confirmarMudaStatusDefeito(regId,idx,novoStatus){
  const r=DB.registros[ativoSel].find(x=>x.id===regId);
  const d=r?.campos?.defeitos?.[idx];
  if(!d)return;
  const atual=d.status==='co'?'co':'ac';
  if(atual===novoStatus)return; // já está nesse status
  const labels={ac:'Acompanhando',co:'Concluído'};
  if(!confirm('Mudar status para "'+labels[novoStatus]+'"?'))return;
  d.status=novoStatus;
  marcarMudanca();autoBackup();renderRelatorio();
}
function encerrarRegistro(regId){
  if(!confirm('Encerrar este registro definitivamente?\nEle será movido para o Histórico e não aparecerá mais nos registros ativos.'))return;
  const r=DB.registros[ativoSel].find(x=>x.id===regId);
  if(r){r._encerrado=true;r.campos.status=r.campos.status||'co';}
  marcarMudanca();autoBackup();renderRelatorio();
}
function reabrirRegistro(regId){
  const r=DB.registros[ativoSel].find(x=>x.id===regId);
  if(r){r._encerrado=false;r._hist=false;r.campos.status='ac';}
  marcarMudanca();autoBackup();renderRelatorio();
}

function editSetPct(btnIdx, val, btn){
  const inp=document.getElementById('edit-pct');
  if(inp)inp.value=val;
  [0,1,2,3].forEach(i=>{const b=document.getElementById('edit-pct-btn-'+i);if(b)b.classList.remove('btn-opcao-ativo');});

  editAtualizarBarra();
}
function editAtualizarBarra(){
  const val=parseInt(document.getElementById('edit-pct')?.value)||0;
  const barra=document.getElementById('edit-barra-rasp');
  const label=document.getElementById('edit-barra-label');
  if(!barra)return;
  const dcor=val<=30?'#C62828':val<=50?'#E65100':val<=75?'#F9A825':'#2E7D32';
  const dlbl=val<=30?'Crítico':val<=50?'Alto':val<=75?'Médio':'Bom';
  barra.style.width=Math.min(val,100)+'%';
  barra.style.background=val>0?dcor:'#E5E8ED';
  if(label)label.textContent=val>0?val+'% — '+dlbl:'';
}

function salvarEdicaoAtualizacao(regId,defIdx,updIdx,ns){
  const r=DB.registros[ativoSel].find(x=>x.id===regId);
  const d=r?.campos?.defeitos?.[defIdx];
  if(!d?.atualizacoes?.[updIdx])return;
  const u=d.atualizacoes[updIdx];
  u.data=document.getElementById('upd-data')?.value||u.data;
  u.status=document.getElementById('upd-status')?.value||u.status;
  u.crit=document.getElementById('upd-crit')?.value||'';
  u.loc=document.getElementById('upd-loc')?.value||'';
  u.desc=(document.getElementById('upd-desc')?.value||'').trim()||'Sem relato';
  u.fotos=getGalFotos(ns);
  marcarMudanca();autoBackup();
  fecharModalUpd();
  mostrarToast('✓ Atualização editada','#2E7D32');
  renderRelatorio();
}
function encerrarDefeito(regId,idx){
  if(!confirm('Encerrar este defeito definitivamente?\nEle será movido para o Histórico.'))return;
  const r=DB.registros[ativoSel].find(x=>x.id===regId);
  if(!r||!r.campos.defeitos[idx])return;
  r.campos.defeitos[idx]._encerrado=true;
  // Se todos defeitos do registro estiverem encerrados, encerra o registro também
  if(r.campos.defeitos.every(d=>d._encerrado))r._encerrado=true;
  marcarMudanca();autoBackup();renderRelatorio();
}
function reabrirDefeito(regId,idx){
  const r=DB.registros[ativoSel].find(x=>x.id===regId);
  if(!r||!r.campos.defeitos[idx])return;
  r.campos.defeitos[idx]._encerrado=false;
  r.campos.defeitos[idx].status='ac';
  r._encerrado=false;r._hist=false;
  marcarMudanca();autoBackup();renderRelatorio();
}
function fecharModalUpd(){
  document.getElementById('modal-upd')?.remove();
  _updRegId=null; _updDefIdx=null;
}

function salvarAtualizacaoDefeito(){
  if(_updRegId===null||_updDefIdx===null)return;
  const r=DB.registros[ativoSel].find(x=>x.id===_updRegId);
  const d=r?.campos?.defeitos?.[_updDefIdx];
  if(!d)return;
  const ns='upd-'+_updRegId+'-'+_updDefIdx;
  const data=document.getElementById('upd-data')?.value||dataHojeISO();
  const status=document.getElementById('upd-status')?.value||'ac';
  const crit=document.getElementById('upd-crit')?.value||'';
  const loc=document.getElementById('upd-loc')?.value||'';
  const desc=(document.getElementById('upd-desc')?.value||'').trim()||'Sem relato';
  const fotos=getGalFotos(ns);
  if(!d.atualizacoes)d.atualizacoes=[];
  d.atualizacoes.push({data,status,crit,loc,desc,fotos});
  // Atualiza o status atual do defeito
  d.status=status;
  marcarMudanca(); autoBackup();
  fecharModalUpd();
  mostrarToast('✓ Atualização registrada na linha do tempo','#2E7D32');
  renderRelatorio();
}

let _mesclarSel=[];  // [{regId, defIdx}]

function iniciarMesclar(regId,defIdx){
  const jaEsta=_mesclarSel.findIndex(s=>s.regId===regId&&s.defIdx===defIdx);
  if(jaEsta>=0){
    _mesclarSel.splice(jaEsta,1);
  } else {
    if(_mesclarSel.length>=2){mostrarToast('Selecione apenas 2 defeitos para mesclar','#E65100');return;}
    _mesclarSel.push({regId,defIdx});
  }
  // Atualiza visual dos blocos
  document.querySelectorAll('[id^="def-bloco-"]').forEach(el=>el.classList.remove('mesclar-sel'));
  _mesclarSel.forEach(s=>{

function confirmarDesfazer(idx){

  DB.registros[ativoSel]=JSON.parse(JSON.stringify(s.snapshot));

  _snapshotsMescla[ativoSel].splice(idx);

// Pilha de snapshots para desfazer mesclagem — máx 5 por ativo
const _snapshotsMescla={};

function separarMesclado(regId, defIdx, updIdx){
  if(!confirm('Separar este item mesclado em um defeito independente?\n\nEle será removido da linha do tempo e recriado como um novo registro de defeito.'))return;
  const r=DB.registros[ativoSel].find(x=>x.id===regId);
  const d=r?.campos?.defeitos?.[defIdx];
  const u=d?.atualizacoes?.[updIdx];
  if(!u)return;

  // Remove o ' [Mesclado]' do final da desc se existir
  const descLimpa=(u.desc||'').replace(/\s*\[Mesclado\]/g,'').replace(/\s*\[Mesclado de registro separado\]/g,'').trim();

  // Cria novo registro de defeito com os dados da entrada mesclada
  const novoDefeito={
    tipo: d.tipo||'',
    dataEmenda: d.dataEmenda||'',
    loc: u.loc||d.loc||'',
    crit: u.crit||d.crit||'',
    status: u.status==='co'?'co':'ac',
    desc: descLimpa||'Sem relato',
    fotos: u.fotos||[],
    atualizacoes: [],
    _encerrado: false
  };

  // Coletar atualizações que também vieram desta mesclagem (mesmas _origem e posteriores)
  const outrasDoMesclado=[];
  (d.atualizacoes||[]).forEach((uu,uui)=>{
    if(uui!==updIdx && uu._origem==='Mesclado'){
      outrasDoMesclado.push({idx:uui, entrada:{...uu}});
    }
  });

  // Remove a entrada da timeline (e as outras do mesmo mesclado)
  const idxsRemover=[updIdx,...outrasDoMesclado.map(x=>x.idx)].sort((a,b)=>b-a);
  idxsRemover.forEach(idx=>d.atualizacoes.splice(idx,1));

  // Adiciona as outras entradas mescladas como atualizações do novo defeito
  outrasDoMesclado.forEach(x=>{
    const desc2=(x.entrada.desc||'').replace(/\s*\[Mesclado\]/g,'').replace(/\s*\[Mesclado de registro separado\]/g,'').trim();
    novoDefeito.atualizacoes.push({...x.entrada, desc:desc2, _origem:undefined});
  });

  // Adiciona o novo defeito ao mesmo registro de data ou cria registro novo
  const dataAlvo=u.data||r.data;
  // Tenta usar um registro de defeito existente da mesma data, ou cria um novo
  let regAlvo=DB.registros[ativoSel].find(x=>x.tipo==='defeito'&&x.data===dataAlvo&&!x._encerrado&&x.id!==regId);
  if(!regAlvo){
    regAlvo={id:newId(),tipo:'defeito',data:dataAlvo,desc:'Defeito separado',fotos:[],campos:{defeitos:[]},_hist:false,_encerrado:false};
    DB.registros[ativoSel].unshift(regAlvo);
  }
  regAlvo.campos.defeitos.push(novoDefeito);

  marcarMudanca();autoBackup();
  mostrarToast('✓ Defeito separado com sucesso — veja na seção Defeitos/Reparos','#2E7D32');
  renderRelatorio();
}

function confirmarMesclar(){
  if(_mesclarSel.length!==2){return;}
  const [a,b]=_mesclarSel;
  const rA=DB.registros[ativoSel].find(x=>x.id===a.regId);
  const rB=DB.registros[ativoSel].find(x=>x.id===b.regId);
  if(!rA||!rB)return;
  const dA=rA.campos.defeitos[a.defIdx];
  const dB=rB.campos.defeitos[b.defIdx];
  if(!dA||!dB)return;

  // ── Salva snapshot ANTES de mesclar ──────────────────────────
  if(!_snapshotsMescla[ativoSel])_snapshotsMescla[ativoSel]=[];
  _snapshotsMescla[ativoSel].push({
    ts: Date.now(),
    descA: dA.desc||'Defeito A',
    descB: dB.desc||'Defeito B',
    snapshot: JSON.parse(JSON.stringify(DB.registros[ativoSel]))
  });
  // Mantém só os últimos 5 snapshots por ativo
  if(_snapshotsMescla[ativoSel].length>5)_snapshotsMescla[ativoSel].shift();

  // ── Mescla: dA absorve dB ─────────────────────────────────────
  if(!dA.atualizacoes)dA.atualizacoes=[];
  (dB.atualizacoes||[]).forEach(u=>dA.atualizacoes.push({...u,_origem:'Mesclado'}));
  dA.atualizacoes.unshift({
    data:rB.data,
    status:dB.status,
    crit:dB.crit,
    loc:dB.loc,
    desc:(dB.desc&&dB.desc!=='Sem relato'?dB.desc:'')+' [Mesclado]',
    fotos:dB.fotos||[],
    _origem:'Mesclado'
  });
  dA.atualizacoes.sort((x,y)=>x.data.localeCompare(y.data));
  if(a.regId===b.regId){
    rA.campos.defeitos.splice(b.defIdx,1);
  } else {
    rB.campos.defeitos.splice(b.defIdx,1);
    if(rB.campos.defeitos.length===0){
      DB.registros[ativoSel]=DB.registros[ativoSel].filter(x=>x.id!==b.regId);
    }
  }
  cancelarMesclar();
  marcarMudanca(); autoBackup();
  mostrarToast('✓ Defeitos mesclados — use "Desfazer mesclagem" para reverter','#2E7D32');
  renderRelatorio();
}

    r.campos.crit=document.getElementById('ed-crit')?.value||'';

  }

    r.campos.pos=document.getElementById('edit-pos')?.value||'';
    r.fotos=getGalFotos(ns);
  }
  else if(r.tipo==='anotacao'){
    r.desc=document.getElementById('edit-desc')?.value||r.desc;
    r.fotos=getGalFotos(ns);
  }
  else if(r.tipo==='defeito'){

// Filtro geral — aparece no topo do bloco de histórico
// ── Coleta anos e meses únicos de uma lista de registros ──────────────────
function _extrairAnos(regs){
  const mapa={};
  regs.forEach(r=>{
    if(!r.data)return;
    const [ano,mes]=r.data.split('-');
    if(!mapa[ano])mapa[ano]={};
    if(!mapa[ano][mes])mapa[ano][mes]=0;
    mapa[ano][mes]++;
  });
  return mapa;
}

// ── Monta HTML da árvore ano/mês para um subId ────────────────────────────
function buildArvoreAnos(subId, mapa){
  const MESES=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  const anos=Object.keys(mapa).sort((a,b)=>b-a); // mais recente primeiro
  if(!anos.length)return '';
  let h='';
  anos.forEach(ano=>{
    const meses=mapa[ano];
    const total=Object.values(meses).reduce((s,c)=>s+c,0);
    const uid=subId+'-ano-'+ano;
    h+=`<div>
      <div class="hf-ano-row" onclick="toggleAnoFiltro('${uid}','${subId}','${ano}')">
        <span class="hf-chk" id="${uid}-chk"></span>
        <span class="hf-ano-label">${ano}</span>
        <span class="hf-count">${total}</span>
        <i class="ti ti-chevron-right hf-chevron" id="${uid}-chev"></i>
      </div>
      <div class="hf-meses" id="${uid}-meses">`;
    Object.keys(meses).sort().forEach(mes=>{
      const mid=uid+'-m'+mes;
      const mesNome=MESES[parseInt(mes)-1]||mes;
      h+=`<div class="hf-mes-row" onclick="toggleMesFiltro('${mid}','${subId}','${ano}','${mes}')">
        <span class="hf-chk" id="${mid}-chk"></span>
        <span class="hf-mes-label">${mesNome} <span style="color:#9CA3AF;font-size:10px;">(${meses[mes]})</span></span>
      </div>`;
    });
    h+=`</div></div>`;
  });
  return h;
}

  const todosRegs=[];
  Object.values(DB.registros).forEach(regs=>regs.forEach(r=>todosRegs.push(r)));

// ── Estado dos filtros de árvore por subId ───────────────────────────────
const _filtroAnos={};  // {subId: {anosSel:Set, mesesSel:{ano:Set}}}

function _getFiltroState(subId){
  if(!_filtroAnos[subId])_filtroAnos[subId]={anosSel:new Set(),mesesSel:{}};
  return _filtroAnos[subId];
}

function toggleAnoFiltro(uid,subId,ano){
  const st=_getFiltroState(subId);
  const chevEl=document.getElementById(uid+'-chev');
  const mesesEl=document.getElementById(uid+'-meses');
  // Abre/fecha meses
  const estaAberto=mesesEl&&mesesEl.style.display==='block';
  if(mesesEl)mesesEl.style.display=estaAberto?'none':'block';
  if(chevEl)chevEl.classList.toggle('open',!estaAberto);
  // Toggle seleção do ano inteiro
  const chkEl=document.getElementById(uid+'-chk');
  const anoSel=st.anosSel.has(ano);
  if(anoSel){
    st.anosSel.delete(ano);
    delete st.mesesSel[ano];
    if(chkEl){chkEl.className='hf-chk';}
    // Desmarca todos meses
    document.querySelectorAll(`[id^="${uid}-m"][id$="-chk"]`).forEach(el=>el.className='hf-chk');
  } else {
    // Não seleciona o ano inteiro ao abrir — só ao clicar no checkbox
  }
  _aplicarFiltroArvore(subId);
}

function toggleMesFiltro(mid,subId,ano,mes){
  const st=_getFiltroState(subId);
  if(!st.mesesSel[ano])st.mesesSel[ano]=new Set();
  const chkEl=document.getElementById(mid+'-chk');
  const uid=subId+'-ano-'+ano;
  const anoChk=document.getElementById(uid+'-chk');
  if(st.mesesSel[ano].has(mes)){
    st.mesesSel[ano].delete(mes);
    if(chkEl)chkEl.className='hf-chk';
    // Se nenhum mês selecionado, remove o ano
    if(st.mesesSel[ano].size===0){
      delete st.mesesSel[ano];
      st.anosSel.delete(ano);
      if(anoChk)anoChk.className='hf-chk';
    } else {
      if(anoChk)anoChk.className='hf-chk parcial';
    }
  } else {
    st.mesesSel[ano].add(mes);
    if(chkEl)chkEl.className='hf-chk sel';
    if(anoChk)anoChk.className='hf-chk parcial';
  }
  _aplicarFiltroArvore(subId);
}

}

// Verifica se um registro contém o texto buscado
function _passaBuscaLivre(r,busca){
  if(!busca)return true;
  const textos=[r.desc||''];
  const c=r.campos||{};
  if(c.tipo)textos.push(c.tipo);
  if(c.bal)textos.push(c.bal);
  if(c.local)textos.push(c.local);
  if(c.crit)textos.push(c.crit);
  (c.defeitos||[]).forEach(d=>{
    textos.push(d.desc||'');
    textos.push(d.loc||'');
    textos.push(d.crit||'');
    (d.atualizacoes||[]).forEach(u=>textos.push(u.desc||''));
  });
  (r.campos?.pct)?textos.push(String(r.campos.pct)):'';
  return textos.some(t=>t.toLowerCase().includes(busca));
}

function aplicarBuscaLivre(subId){_aplicarFiltroArvore(subId);}

function _aplicarFiltroArvore(subId){
  const container=document.getElementById(subId+'-cards');
  const res=document.getElementById(subId+'-resultado');
  if(!container)return;
  const st=_getFiltroState(subId);
  const busca=_getBuscaLivre(subId);
  // Monta set de ano-mes selecionados
  const filtros=new Set();
  Object.entries(st.mesesSel).forEach(([ano,meses])=>{
    meses.forEach(m=>filtros.add(ano+'-'+m.padStart(2,'0')));
  });
  const temDataFiltro=filtros.size>0;
  const temBusca=busca.length>0;
  const temFiltro=temDataFiltro||temBusca;
  let visiveis=0,total=0;
  container.querySelectorAll('.reg-card').forEach(card=>{
    const regId=card.id.replace('card-','');
    const r=DB.registros[ativoSel]?.find(x=>x.id===regId);
    total++;
    if(!temFiltro){card.style.display='';visiveis++;return;}
    if(!r){card.style.display='none';return;}
    // Filtro de data
    let passaData=true;
    if(temDataFiltro){
      const anoMes=(r.data||'').substring(0,7);
      passaData=filtros.has(anoMes);
    }
    // Filtro de busca livre
    const passaBusca=_passaBuscaLivre(r,busca);
    const passa=passaData&&passaBusca;
    card.style.display=passa?'':'none';
    if(passa)visiveis++;
  });
  const counter=document.getElementById(subId+'-count');
  if(counter)counter.textContent=visiveis+'/'+total;
  if(res){
    if(temFiltro){
      let txt=visiveis+' de '+total+' registro(s)';
      if(temBusca)txt+=' — "'+busca+'"';
      res.style.display='block';res.textContent=txt;
    } else {res.style.display='none';}
  }
}

function exportarBackup(){

function importarBackup(input){
  const file=input.files[0];
  if(!file)return;
  if(!confirm('Importar este backup? Os dados atuais serão SUBSTITUÍDOS.'))return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const payload=JSON.parse(e.target.result);
      if(!payload.versao||!payload.DB_registros){
        alert('Arquivo de backup inválido.');return;
      }
      // Restaura lista de ativos se existir (versão 2+)
      if(Array.isArray(payload.DB_ativos)&&payload.DB_ativos.length){
        ATIVOS.length=0;
        payload.DB_ativos.forEach(a=>ATIVOS.push(a));
      }
      // Restaura dados de cada ativo
      ATIVOS.forEach(a=>{
        if(payload.DB_registros[a.id]) DB.registros[a.id]=payload.DB_registros[a.id];
        if(payload.DB_fichas?.[a.id])    DB.fichas[a.id]=payload.DB_fichas[a.id];
        if(payload.DB_raspAtivos?.[a.id])DB.raspAtivos[a.id]=payload.DB_raspAtivos[a.id];
        _initAtivo(a.id);
      });
      if(Array.isArray(payload.DB_anotacoesGerais)) DB.anotacoesGerais=payload.DB_anotacoesGerais;
      if(Array.isArray(payload.DB_favoritos)) DB.favoritos=new Set(payload.DB_favoritos);
      if(payload.regCounter) regCounter=payload.regCounter+1;
      // Salva direto no IndexedDB sem passar pelo localStorage
      salvarLS().then(()=>{
        mostrarToast('✓ Backup importado com sucesso!','#1565C0');
        marcarSalvo(); renderLista();
      }).catch(()=>{
        mostrarToast('✓ Backup importado!','#1565C0');
        marcarSalvo(); renderLista();
      });
    }catch(err){
      alert('Erro ao ler o backup: '+err.message);
    }
  };
  reader.readAsText(file);
  input.value='';// reset para permitir reimportar mesmo arquivo
}

function mostrarToast(msg,cor){
  let t=document.getElementById('toast-global');
  if(!t){t=document.createElement('div');t.id='toast-global';
    t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1F2937;color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:600;z-index:999;transition:opacity .3s;white-space:nowrap;';
    document.body.appendChild(t);}
  t.textContent=msg;t.style.background=cor||'#1F2937';t.style.opacity='1';
  clearTimeout(t._timer);
  t._timer=setTimeout(()=>{t.style.opacity='0';},2500);
}

// DETECÇÃO DE MUDANÇAS
// ════════════════════════════════
let _dadosSalvos = ''; // snapshot do último save
let _mudancasPendentes = false;

function snapshotDados(){
  return JSON.stringify({
    r: DB.registros,
    f: DB.fichas,
    ra: DB.raspAtivos,
    ag: DB.anotacoesGerais,
    rc: regCounter
  });
}

function marcarMudanca(){
  const atual = snapshotDados();
  _mudancasPendentes = (atual !== _dadosSalvos);
  atualizarIndicadorMudanca();
}

function marcarSalvo(){
  _dadosSalvos = snapshotDados();
  _mudancasPendentes = false;
  atualizarIndicadorMudanca();
}

function atualizarIndicadorMudanca(){
  const ind = document.getElementById('indicador-mudanca');
  if(ind) ind.style.display = _mudancasPendentes ? 'flex' : 'none';
}

// Intercepta fechamento da aba
window.addEventListener('beforeunload', e => {
  marcarMudanca();
  if(_mudancasPendentes){
    e.preventDefault();
    e.returnValue = 'Há alterações não salvas. Deseja sair mesmo assim?';
    return e.returnValue;
  }
});

// Patch: chamar marcarMudanca após qualquer operação que altera dados
const _origUnshift = Array.prototype.unshift;
// Wrapper das funções de salvar para marcar mudança
function _wrapSalvar(fn){
  return function(){
    const r = fn.apply(this, arguments);
    setTimeout(marcarMudanca, 100);
    autoBackup();
    return r;
  };
}

}

function _fazerBackup(comFeedback=true){

  a.href = url;

  clone.querySelectorAll('.no-print,.rel-sec-toggle,.rel-sec-chk,.item-print-chk,.btn-prim,.btn-sec,.btn-sm,.galeria-add-btn').forEach(el=>el.remove());
  clone.querySelectorAll('.print-item-oculto').forEach(el=>el.remove());

// ══════════════════════════════════════
// INDEXEDDB — ARMAZENAMENTO PRINCIPAL
// Sem limite de tamanho, não afeta cache do Chrome
// Fotos em tamanho original suportadas
// ══════════════════════════════════════
const IDB_NAME = 'inspecao_db';
const IDB_VER  = 1;
const IDB_STORE = 'dados';
const IDB_KEY   = 'principal';
const LS_KEY_FALLBACK = 'inspecao_v3'; // fallback para migração

let _idb = null;

function abrirIDB(){
  return new Promise((resolve, reject) => {
    if(_idb){ resolve(_idb); return; }
    const req = indexedDB.open(IDB_NAME, IDB_VER);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      if(!db.objectStoreNames.contains(IDB_STORE)){
        db.createObjectStore(IDB_STORE);
      }
    };
    req.onsuccess = e => { _idb = e.target.result; resolve(_idb); };
    req.onerror   = () => reject(req.error);
  });
}

async function salvarLS(){
  const payload = {
    ativos: ATIVOS,
    registros: DB.registros,
    fichas: DB.fichas,
    raspAtivos: DB.raspAtivos,
    anotacoesGerais: DB.anotacoesGerais,
    favoritos: [...DB.favoritos],
    rc: regCounter
  };
  try{
    const db = await abrirIDB();
    await new Promise((resolve, reject) => {
      const tx = db.transaction(IDB_STORE, 'readwrite');
      tx.objectStore(IDB_STORE).put(payload, IDB_KEY);
      tx.oncomplete = resolve;
      tx.onerror    = () => reject(tx.error);
    });
  }catch(e){
    // IndexedDB falhou — não tenta localStorage (pode estar cheio)
    // Avisa só se não avisou nos últimos 30s
    const agora=Date.now();
    if(!window._ultimoToastStorage||agora-window._ultimoToastStorage>30000){
      window._ultimoToastStorage=agora;
      mostrarToast('⚠ Erro ao salvar — faça backup manual!','#C62828');
    }
  }
}

async function carregarLS(){
  // 1. Tenta carregar do IndexedDB
  try{
    const db = await abrirIDB();
    const d = await new Promise((resolve, reject) => {
      const tx = db.transaction(IDB_STORE, 'readonly');
      const req = tx.objectStore(IDB_STORE).get(IDB_KEY);
      req.onsuccess = () => resolve(req.result);
      req.onerror   = () => reject(req.error);
    });
    if(d && _aplicarDados(d)) return true;
  }catch(e){}

  // 2. Fallback: migra do localStorage para o IndexedDB
  try{
    const raw = localStorage.getItem(LS_KEY_FALLBACK);
    if(!raw) return false;
    const d = JSON.parse(raw);
    if(_aplicarDados(d)){
      // Migra para IndexedDB e limpa localStorage
      await salvarLS();
      try{ localStorage.removeItem(LS_KEY_FALLBACK); }catch{}
      mostrarToast('✓ Dados migrados para armazenamento expandido','#2E7D32');
      return true;
    }
  }catch(e){}
  return false;
}

function _aplicarDados(d){
  try{
    if(Array.isArray(d.ativos) && d.ativos.length){
      ATIVOS.length = 0;
      d.ativos.forEach(a=>{ ATIVOS.push(a); _initAtivo(a.id); });
    }
    ATIVOS.forEach(a=>{
      if(d.registros?.[a.id])  DB.registros[a.id]  = d.registros[a.id];
      if(d.fichas?.[a.id])     DB.fichas[a.id]      = d.fichas[a.id];
      if(d.raspAtivos?.[a.id]) DB.raspAtivos[a.id]  = d.raspAtivos[a.id];
    });
    if(Array.isArray(d.anotacoesGerais)) DB.anotacoesGerais = d.anotacoesGerais;
    if(Array.isArray(d.favoritos))       DB.favoritos = new Set(d.favoritos);
    if(d.rc) regCounter = d.rc + 1;
    return true;
  }catch(e){ return false; }
}

function contarAlteracaoDrive(){
  _driveAlteracoes++;

  if(_driveAlteracoes>=DRIVE_LEMBRETE_APOS&&!_driveLembreteAtivo){

function atualizarFabDrive(){
  const fab=document.getElementById('drive-fab');
  const btn=document.getElementById('drive-fab-btn');
  const status=document.getElementById('drive-fab-status');
  if(!fab)return;
  fab.style.display='flex';
  if(_driveAlteracoes===0&&_driveUltimaSync){
    btn.className='drive-fab-btn drive-fab-main sincronizado';
    const mins=Math.round((Date.now()-_driveUltimaSync)/60000);
    if(mins<1){
      // "agora mesmo" — mostra por 4s e some
      status.textContent='✓ Sincronizado!';
      status.style.display='block';
      clearTimeout(window._driveStatusTimer);
      window._driveStatusTimer=setTimeout(()=>{if(status)status.style.display='none';},4000);
    } else {
      // Após 1+ min não mostra nada — o botão verde já indica sincronizado
      status.style.display='none';
    }
  } else if(_driveAlteracoes>0){
    btn.className='drive-fab-btn drive-fab-main pendente';
    status.textContent=_driveAlteracoes+' não sincronizada(s)';
    status.style.display='block';
  } else {
    btn.className='drive-fab-btn drive-fab-main';
    status.style.display='none';
  }
}

function mostrarLembreteDrive(){
  _driveLembreteAtivo=true;
  const sub=document.getElementById('drive-lembrete-sub');
  if(sub)sub.textContent='Você tem '+_driveAlteracoes+' alteração(ões) não sincronizadas com o Drive.';
  const el=document.getElementById('drive-lembrete');
  if(el)el.style.display='block';
}

function fecharLembrete(){
  _driveLembreteAtivo=false;
  const el=document.getElementById('drive-lembrete');
  if(el)el.style.display='none';
}

async function salvarNoDrive(viaLembrete){
  fecharLembrete();
  const btn=document.getElementById('drive-fab-btn');
  const status=document.getElementById('drive-fab-status');
  if(btn){btn.innerHTML='<i class="ti ti-loader" style="animation:spin 1s linear infinite;"></i> Salvando...';btn.disabled=true;}
  if(status)status.textContent='Conectando ao Drive...';

  try{
    // Gera o JSON do backup
    const payload=_gerarPayload();
    const json=JSON.stringify(payload,null,2);
    const blob=new Blob([json],{type:'application/json'});

    // Nome do arquivo com data/hora
    const agora=new Date();
    const pad=n=>String(n).padStart(2,'0');
    const nomeArq=`backup_inspecao_${agora.getFullYear()}${pad(agora.getMonth()+1)}${pad(agora.getDate())}_${pad(agora.getHours())}${pad(agora.getMinutes())}.json`;

    // Celular: tenta compartilhar direto (abre menu com Google Drive, WhatsApp etc.)
    const isMobile=/Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
    if(isMobile && navigator.share){
      try{
        const file=new File([blob],nomeArq,{type:'application/json'});
        const canShareFile=navigator.canShare&&navigator.canShare({files:[file]});
        if(canShareFile){
          await navigator.share({
            title:'Backup Inspeção — '+agora.toLocaleDateString('pt-BR'),
            text:'Backup do app de inspeção de correia',
            files:[file]
          });
        } else {
          // Share sem arquivo (link/texto)
          const url=URL.createObjectURL(blob);
          const a=document.createElement('a');a.href=url;a.download=nomeArq;a.click();
          setTimeout(()=>URL.revokeObjectURL(url),1000);
        }
        _driveAlteracoes=0;_driveUltimaSync=Date.now();
        try{localStorage.setItem(DRIVE_LS_KEY,String(_driveUltimaSync));}catch{}
        atualizarFabDrive();
        mostrarToast('✓ Arquivo pronto — escolha Google Drive para salvar','#2E7D32');
        if(btn){btn.disabled=false;_atualizarBotaoDrive();}
        return;
      }catch(shareErr){
        if(shareErr.name==='AbortError'){
          mostrarToast('Cancelado','#6B7280');
          if(btn){btn.disabled=false;_atualizarBotaoDrive();}
          return;
        }
        // Se falhou no share, cai no download abaixo
      }
    }

    // Desktop ou fallback: download direto do arquivo
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download=nomeArq;
    document.body.appendChild(a);a.click();
    setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},1000);
    _driveAlteracoes=0;_driveUltimaSync=Date.now();
    try{localStorage.setItem(DRIVE_LS_KEY,String(_driveUltimaSync));}catch{}
    atualizarFabDrive();
    mostrarToast('✓ Backup baixado — arraste para sua pasta do Drive','#1565C0');
  }catch(e){
    if(e.name!=='AbortError'){
      // Último recurso: exportar via blob URL manual
      try{
        const url2=URL.createObjectURL(blob);
        window.open(url2,'_blank');
        setTimeout(()=>URL.revokeObjectURL(url2),3000);
        mostrarToast('Backup aberto em nova aba — salve o arquivo','#1565C0');
      }catch{
        mostrarToast('Erro ao salvar. Use o botão ⬇ para exportar manualmente.','#C62828');
      }
    }
  }finally{
    if(btn){btn.disabled=false;_atualizarBotaoDrive();}
  }
}

// Atualiza indicador de memória a cada 30s e ao iniciar
async function atualizarMemoriaDrive(){
  const wrap=document.getElementById('drive-mem-wrap');
  const pct=document.getElementById('drive-mem-pct');
  if(!wrap)return;

  try{
    if('storage' in navigator && 'estimate' in navigator.storage){
      const est=await navigator.storage.estimate();
      const usado=est.usage||0;
      const total=est.quota||0;
      if(total===0){wrap.style.display='none';return;}
      const perc=Math.min(Math.round((usado/total)*100),100);
      const usadoMB=(usado/1024/1024).toFixed(0);
      const totalMB=total>1073741824
        ?(total/1073741824).toFixed(1)+' GB'
        :(total/1024/1024).toFixed(0)+' MB';

      // Cor da bateria por nível
      let cor='#2E7D32';   // verde — ok
      if(perc>=50) cor='#F9A825';  // amarelo
      if(perc>=75) cor='#E65100';  // laranja
      if(perc>=90) cor='#C62828';  // vermelho crítico

      // Anel SVG: circunferência = 2π×12 ≈ 75.4
      const circ=75.4;
      const ring=document.getElementById('drive-mem-ring');
      if(ring){
        ring.style.strokeDashoffset=circ-(circ*perc/100);
        ring.style.stroke=cor;
      }
      if(pct){pct.textContent=perc+'%';pct.style.fill=perc>=75?'#FFD54F':'#fff';}
      wrap.title='Armazenamento: '+usadoMB+'MB de '+totalMB+' usados';
      wrap.style.display='flex';
    } else {
      wrap.style.display='none';
    }
  }catch{wrap.style.display='none';}
}
