<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Inspeção">
<meta name="theme-color" content="#1F3864">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.png">
<title>Inspeção de Correia — Washington Sales</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F0F2F5;min-height:100vh;}
.topbar{background:#1F3864;color:#fff;padding:14px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;}
.topbar-back{background:none;border:none;color:#fff;font-size:20px;cursor:pointer;padding:2px 6px 2px 0;display:none;}
.topbar-back.vis{display:block;}
.topbar-home{background:rgba(255,255,255,.15);border:none;color:#fff;font-size:16px;cursor:pointer;padding:5px 9px;border-radius:7px;flex-shrink:0;display:flex;align-items:center;gap:4px;transition:background .15s;}
.topbar-home:active{background:rgba(255,255,255,.3);}

/* ── BOTÃO FLUTUANTE DRIVE ── */
.drive-fab{position:fixed;bottom:22px;right:16px;z-index:200;display:flex;flex-direction:column;align-items:flex-end;gap:6px;}
.drive-fab-btn{display:flex;align-items:center;gap:8px;padding:11px 16px;border-radius:50px;border:none;cursor:pointer;font-size:13px;font-weight:700;box-shadow:0 4px 16px rgba(0,0,0,.18);transition:transform .15s,box-shadow .15s;}
.drive-fab-btn:active{transform:scale(.96);}
.drive-fab-main{background:#1F3864;color:#fff;}
.drive-fab-main.sincronizado{background:#2E7D32;}
.drive-fab-main.pendente{background:#E65100;animation:pulse-fab 2s infinite;}
/* Indicador de memória — estilo bateria */
/* drive-mem: círculo SVG inline */
@keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
@keyframes pulse-fab{0%,100%{box-shadow:0 4px 16px rgba(230,81,0,.3);}50%{box-shadow:0 4px 24px rgba(230,81,0,.6);}}
.drive-fab-status{font-size:10px;color:#fff;background:rgba(0,0,0,.45);padding:3px 9px;border-radius:10px;text-align:right;pointer-events:none;}

/* ── LEMBRETE DRIVE ── */
.drive-lembrete{position:fixed;bottom:80px;right:16px;left:16px;z-index:199;background:#1F3864;color:#fff;border-radius:14px;padding:14px 16px;box-shadow:0 6px 24px rgba(0,0,0,.25);display:none;animation:slide-up .25s ease;}
@keyframes slide-up{from{transform:translateY(20px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.drive-lembrete-titulo{font-size:14px;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:8px;}
.drive-lembrete-sub{font-size:12px;opacity:.8;margin-bottom:12px;}
.drive-lembrete-btns{display:flex;gap:8px;}
.drive-lembrete-btns button{flex:1;padding:9px;border:none;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;}
.drive-btn-sim{background:#fff;color:#1F3864;}
.drive-btn-depois{background:rgba(255,255,255,.2);color:#fff;}
.topbar-home span{font-size:11px;font-weight:600;letter-spacing:.02em;}
.topbar-info{flex:1;}
.topbar h1{font-size:15px;font-weight:600;}
.topbar p{font-size:11px;opacity:.65;margin-top:1px;}
.step-bar{display:flex;align-items:center;padding:12px 16px;background:#fff;border-bottom:1px solid #E5E8ED;}
.step-dot{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;}
.step-dot.ativo{background:#1F3864;color:#fff;}
.step-dot.feito{background:#D4EDDA;color:#2E7D32;}
.step-dot.inativo{background:#EEF0F3;color:#9CA3AF;}
.step-line{flex:1;height:2px;background:#EEF0F3;}
.step-line.feito{background:#D4EDDA;}
.step-labels{display:flex;justify-content:space-between;padding:2px 10px 10px;background:#fff;border-bottom:1px solid #E5E8ED;}
.step-lbl{font-size:10px;color:#9CA3AF;text-align:center;width:70px;}
.step-lbl.ativo{color:#1F3864;font-weight:600;}
.content{padding:12px;}

/* LISTA DE ATIVOS — GRID */
.ativo-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.ativo-card{background:#fff;border:1px solid #E5E8ED;border-radius:12px;padding:12px 10px;cursor:pointer;display:flex;flex-direction:column;align-items:center;text-align:center;gap:5px;transition:border-color .15s;}
.ativo-card:active{background:#F5F7FA;border-color:#2E75B6;}
.ativo-card .ac-icon{font-size:24px;color:#2E75B6;margin-bottom:2px;}
.ativo-card .ac-id{font-size:13px;font-weight:700;color:#1F3864;}
.ativo-card .ac-tipo{font-size:10px;color:#9CA3AF;}
/* Card Anotações Gerais — ocupa linha inteira */
.anotacoes-gerais-card{background:#1F3864;border-radius:12px;padding:14px 16px;cursor:pointer;display:flex;align-items:center;gap:12px;margin-bottom:8px;}
.anotacoes-gerais-card:active{opacity:.88;}
.anotacoes-gerais-card i{font-size:26px;color:#BDD9F8;}
.anotacoes-gerais-card .ag-titulo{font-size:14px;font-weight:700;color:#fff;}
.anotacoes-gerais-card .ag-sub{font-size:11px;color:#BDD9F8;margin-top:1px;}
/* FAVORITOS CARD */
.fav-card{background:#2E75B6;border-radius:12px;padding:14px 16px;cursor:pointer;display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.fav-card:active{opacity:.88;}
.fav-card i{font-size:26px;color:#BDD9F8;}
.fav-card .ag-titulo{font-size:14px;font-weight:700;color:#fff;}
.fav-card .ag-sub{font-size:11px;color:#BDD9F8;margin-top:1px;}
/* ATIVO CARD 3 PONTOS */
.ativo-card-wrap{position:relative;}
.ativo-card-dots{position:absolute;top:6px;right:6px;background:none;border:none;font-size:18px;color:#C4C9D4;cursor:pointer;padding:2px 4px;border-radius:5px;z-index:2;line-height:1;}
.ativo-card-dots:active{background:#EEF0F3;}
.ativo-fav-star{position:absolute;top:6px;left:6px;font-size:14px;color:#F59E0B;z-index:2;}
/* DROPDOWN MENU */
.ativo-dropdown{position:absolute;top:30px;right:6px;background:#fff;border:1px solid #E5E8ED;border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,.12);z-index:50;min-width:150px;overflow:hidden;}
.ativo-dropdown-item{display:flex;align-items:center;gap:9px;padding:11px 14px;font-size:13px;font-weight:500;cursor:pointer;color:#374151;border-bottom:1px solid #F3F4F6;}
.ativo-dropdown-item:last-child{border-bottom:none;}
.ativo-dropdown-item:active{background:#F5F7FA;}
.ativo-dropdown-item.danger{color:#C62828;}
.ativo-dropdown-item i{font-size:16px;flex-shrink:0;}

.pill{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;display:inline-block;}
.pill-ok{background:#E8F5E9;color:#2E7D32;}
.pill-at{background:#FFF3E0;color:#E65100;}
.pill-vn{background:#FFEBEE;color:#C62828;}
.pill-neu{background:#EEF0F3;color:#6B7280;}
.pill-blue{background:#E3F2FD;color:#1565C0;}

/* MENU DO ATIVO */
.ativo-banner{background:#fff;border:1px solid #E5E8ED;border-radius:12px;padding:12px 14px;margin-bottom:13px;display:flex;align-items:center;gap:12px;}
.ativo-banner i{font-size:22px;color:#2E75B6;}
.ab-id{font-size:15px;font-weight:700;color:#1F3864;}
.ab-nome{font-size:12px;color:#6B7280;margin-top:1px;}
.card-btn{background:#fff;border:1px solid #E5E8ED;border-radius:12px;padding:13px 8px;text-align:center;cursor:pointer;}
.card-btn:active{background:#F5F7FA;}
.card-btn.destaque{border:1.5px solid #1F3864;background:#EBF3FF;padding:14px;}
.card-btn i{font-size:22px;color:#2E75B6;display:block;margin-bottom:5px;}
.card-btn.destaque i{color:#1F3864;}
.card-btn .cb-nome{font-size:11px;font-weight:700;color:#1F2937;line-height:1.3;}
.card-btn .cb-sub{font-size:10px;color:#6B7280;margin-top:2px;}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;}

/* FORM */
.bloco-titulo{font-size:11px;font-weight:600;color:#6B7280;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;}
.form-grupo{margin-bottom:12px;}
.form-grupo label{font-size:13px;color:#374151;font-weight:500;display:block;margin-bottom:3px;}
.lbl-hint{font-size:11px;color:#9CA3AF;font-weight:400;}
.form-grupo input,.form-grupo select,.form-grupo textarea{width:100%;font-size:14px;padding:10px 12px;border:1px solid #D1D5DB;border-radius:8px;background:#fff;color:#111827;-webkit-appearance:none;}
.form-grupo textarea{min-height:75px;resize:vertical;}
.form-grupo input:focus,.form-grupo select:focus,.form-grupo textarea:focus{outline:none;border-color:#2E75B6;box-shadow:0 0 0 3px rgba(46,117,182,.12);}
.desc-opts{display:flex;gap:6px;margin-bottom:7px;flex-wrap:wrap;}
.desc-opt-btn{padding:5px 10px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid #D1D5DB;background:#fff;color:#374151;}
.desc-opt-btn.blue{border-color:#2E75B6;background:#EBF3FF;color:#1F3864;}
.rasp-bloco{background:#F8F9FB;border:1px solid #E5E8ED;border-radius:10px;padding:11px;margin-bottom:8px;}
.rasp-bloco-titulo{font-size:12px;font-weight:700;color:#374151;margin-bottom:9px;display:flex;align-items:center;justify-content:space-between;}
.toggle-row{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;}
.toggle-btn{padding:6px 11px;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;border:1px dashed #D1D5DB;background:#fff;color:#6B7280;display:flex;align-items:center;gap:4px;}
.toggle-btn.ativo{border:1px solid #1F3864;background:#EBF3FF;color:#1F3864;border-style:solid;}
.defeito-card{background:#fff;border:1px solid #E5E8ED;border-radius:10px;padding:11px;margin-bottom:10px;}
.defeito-card-header{font-size:12px;font-weight:700;color:#1F3864;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;}
.btn-opcao{padding:7px 14px;border:2px solid #D1D5DB;border-radius:8px;background:#fff;font-size:12px;font-weight:600;color:#374151;cursor:pointer;transition:all .15s;}
.btn-opcao:active{transform:scale(.97);}
.btn-opcao-ativo{border-color:#1F3864!important;background:#1F3864!important;color:#fff!important;}
.btn-opcao-verde.btn-opcao-ativo{border-color:#2E7D32!important;background:#2E7D32!important;}
.btn-opcao-amarelo.btn-opcao-ativo{border-color:#E65100!important;background:#E65100!important;}
.btn-opcao-vermelho.btn-opcao-ativo{border-color:#C62828!important;background:#C62828!important;}
.btn-opcao-azul.btn-opcao-ativo{border-color:#1565C0!important;background:#1565C0!important;}
.check-row{display:flex;align-items:center;gap:10px;padding:8px 0;}
.check-row input[type=checkbox]{width:18px;height:18px;flex-shrink:0;cursor:pointer;accent-color:#1F3864;}
.check-row label{font-size:13px;color:#1F2937;cursor:pointer;}
.foto-area{border:2px dashed #D1D5DB;border-radius:8px;padding:14px;text-align:center;cursor:pointer;color:#6B7280;font-size:12px;background:#F9FAFB;}
.foto-area i{font-size:26px;display:block;margin-bottom:4px;color:#9CA3AF;}
.foto-prev-img{width:100%;border-radius:8px;margin-top:7px;display:none;}
/* GALERIA */
.galeria-wrap{margin-top:6px;}
.galeria-grid{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;}
.galeria-thumb{position:relative;width:105px;height:105px;border-radius:8px;overflow:hidden;cursor:pointer;background:#EEF0F3;flex-shrink:0;}
.galeria-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
.galeria-thumb .g-rem{position:absolute;top:2px;right:2px;background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:50%;width:18px;height:18px;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;}
.galeria-add-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 13px;border-radius:8px;border:1px solid #D1D5DB;background:#F9FAFB;color:#6B7280;font-size:12px;font-weight:600;cursor:pointer;margin-top:4px;}
.galeria-add-btn i{font-size:15px;}
.galeria-add-btn:active{background:#EEF0F3;}
/* LIGHTBOX */
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:500;align-items:center;justify-content:center;flex-direction:column;}
.lightbox.vis{display:flex;}
.lightbox img{max-width:96vw;max-height:80vh;border-radius:8px;object-fit:contain;}
.lightbox-nav{display:flex;align-items:center;gap:16px;margin-top:14px;}
.lb-btn{background:rgba(255,255,255,.15);border:none;color:#fff;width:40px;height:40px;border-radius:50%;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.lb-btn:disabled{opacity:.3;cursor:default;}
.lb-counter{color:#fff;font-size:13px;min-width:50px;text-align:center;}
.lb-close{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.15);border:none;color:#fff;width:38px;height:38px;border-radius:50%;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;}

.btn-prim{width:100%;padding:13px;background:#1F3864;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;margin-top:6px;}
.btn-prim:active{opacity:.85;}
.btn-sec{width:100%;padding:11px;background:#fff;color:#374151;border:1px solid #D1D5DB;border-radius:10px;font-size:13px;cursor:pointer;margin-top:8px;}
.btn-danger{width:100%;padding:11px;background:#fff;color:#C62828;border:1px solid #FFCDD2;border-radius:10px;font-size:13px;cursor:pointer;margin-top:8px;}
.btn-sm{padding:5px 10px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;border:none;}
.btn-sm-sec{background:#EEF0F3;color:#374151;}
.btn-sm-danger{background:#FFEBEE;color:#C62828;}
.btn-sm-green{background:#E8F5E9;color:#2E7D32;}
.btn-sm-orange{background:#FFF3E0;color:#E65100;}

/* SUCESSO */
.sucesso{text-align:center;padding:24px 14px;}
.sucesso .sico{font-size:48px;color:#2E7D32;display:block;margin-bottom:10px;}
.sucesso h2{font-size:17px;font-weight:600;color:#1F2937;margin-bottom:5px;}
.sucesso p{font-size:13px;color:#6B7280;line-height:1.5;}
.sucesso-detalhes{background:#F8F9FB;border-radius:10px;padding:12px;margin:14px 0;text-align:left;}
.sucesso-row{display:flex;justify-content:space-between;padding:5px 0;font-size:12px;border-bottom:1px solid #F0F2F5;}
.sucesso-row:last-child{border-bottom:none;}
.sucesso-row span:first-child{color:#6B7280;}
.sucesso-row span:last-child{font-weight:600;color:#1F2937;max-width:55%;text-align:right;}

/* RELATÓRIO */
.rel-section{background:#fff;border-radius:12px;border:1px solid #E5E8ED;margin-bottom:12px;overflow:hidden;}
.rel-section-header{background:#1F3864;color:#fff;padding:9px 13px;font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;display:flex;align-items:center;gap:7px;}
.rel-ficha-row{display:flex;border-bottom:1px solid #F0F2F5;font-size:12px;}
.rel-ficha-row:last-child{border-bottom:none;}
.rel-ficha-label{background:#F8F9FB;padding:8px 10px;color:#6B7280;font-weight:500;min-width:95px;flex-shrink:0;}
.rel-ficha-val{padding:8px 10px;color:#1F2937;font-weight:500;flex:1;}
.reg-card{background:#F8F9FB;border:1px solid #E5E8ED;border-radius:8px;padding:11px;margin-bottom:8px;}
.reg-card-header{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.rc-data{font-size:11px;color:#6B7280;}
.reg-card-body{font-size:13px;color:#374151;line-height:1.5;}
.reg-card-footer{display:flex;gap:6px;margin-top:9px;flex-wrap:wrap;}
.hist-sep{font-size:10px;font-weight:700;color:#9CA3AF;text-transform:uppercase;letter-spacing:.06em;padding:9px 0 3px;border-top:1px solid #E5E8ED;margin-top:4px;}
.status-em{background:#FFF3E0;color:#E65100;}
.status-ac{background:#E3F2FD;color:#1565C0;}
.status-co{background:#E8F5E9;color:#2E7D32;}
.status-enc{background:#EDE7F6;color:#4527A0;}
.btn-encerrar{display:inline-flex;align-items:center;gap:4px;padding:5px 10px;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer;border:1.5px solid #4527A0;background:#EDE7F6;color:#4527A0;}
.btn-encerrar:active{background:#D1C4E9;}
.ficha-table{width:100%;border-collapse:collapse;font-size:12px;}
.ficha-table th{background:#1F3864;color:#fff;padding:6px 8px;text-align:left;font-weight:600;}
.ficha-table td{padding:6px 8px;border-bottom:1px solid #F0F2F5;}
.ficha-table tr:last-child td{border-bottom:none;}
.ficha-table .lbl{background:#F0F4FA;color:#374151;font-weight:600;}
.trecho-header{background:#C5D8F0;font-weight:700;color:#1F3864;}
.uss-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-top:8px;}
.uss-cell{text-align:center;}
.uss-num{font-size:11px;color:#2E75B6;font-weight:700;margin-bottom:3px;}
.uss-cell input{width:100%;font-size:13px;padding:7px 4px;border:1px solid #D1D5DB;border-radius:6px;text-align:center;background:#fff;box-sizing:border-box;}
.uss-cell input:focus{outline:none;border-color:#2E75B6;background:#F0F6FF;}
.uss-prev{font-size:9px;color:#9CA3AF;margin-top:2px;min-height:11px;}
.uss-sec-wrap{background:#fff;border-radius:12px;border:1px solid #E5E8ED;margin-bottom:11px;overflow:hidden;}
.uss-sec-hdr{background:#1F3864;padding:10px 14px;display:flex;align-items:center;gap:8px;cursor:pointer;}
.uss-sec-hdr .ush-label{flex:1;font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#fff;}
.uss-sec-toggle{background:rgba(255,255,255,.2);border:none;color:#fff;width:24px;height:24px;border-radius:6px;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.uss-sec-body{padding:12px;display:none;}
.uss-trecho-hdr{font-size:11px;font-weight:700;color:#1F3864;margin:10px 0 6px;display:flex;align-items:center;justify-content:space-between;}
.uss-trecho-hdr:first-child{margin-top:0;}
.empty-state{text-align:center;padding:18px;color:#9CA3AF;font-size:13px;}
.empty-state i{font-size:30px;display:block;margin-bottom:5px;opacity:.4;}

/* ── FILTROS DO HISTÓRICO ── */
/* ── FILTRO ÁRVORE ANO/MÊS ── */
.hf-wrap{background:#F0F4FA;border-top:1px solid #E5E8ED;padding:8px 10px;display:none;}
.hf-ano-row{display:flex;align-items:center;gap:6px;padding:5px 4px;cursor:pointer;border-radius:6px;user-select:none;}
.hf-ano-row:active{background:#E5E8ED;}
.hf-chk{width:15px;height:15px;border:1.5px solid #9CA3AF;border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:#fff;transition:all .15s;}
.hf-chk.sel{background:#1F3864;border-color:#1F3864;}
.hf-chk.sel::after{content:'✓';font-size:9px;color:#fff;font-weight:900;}
.hf-chk.parcial{background:#EBF3FF;border-color:#2E75B6;}
.hf-chk.parcial::after{content:'−';font-size:11px;color:#1F3864;font-weight:900;}
.hf-ano-label{font-size:13px;font-weight:700;color:#1F3864;flex:1;}
.hf-count{font-size:10px;color:#9CA3AF;background:#E5E8ED;padding:1px 6px;border-radius:8px;}
.hf-chevron{font-size:11px;color:#9CA3AF;transition:transform .2s;}
.hf-chevron.open{transform:rotate(90deg);}
.hf-meses{padding-left:20px;display:none;}
.hf-mes-row{display:flex;align-items:center;gap:6px;padding:4px 4px;cursor:pointer;border-radius:6px;user-select:none;}
.hf-mes-row:active{background:#E5E8ED;}
.hf-mes-label{font-size:12px;color:#374151;flex:1;}
.hf-limpar{font-size:10px;color:#C62828;background:none;border:none;cursor:pointer;padding:2px 6px;float:right;}
.hf-resultado{font-size:11px;color:#2E75B6;font-weight:600;margin-top:4px;display:none;padding:0 4px;}
.hf-busca-wrap{margin-top:8px;border-top:1px solid #E5E8ED;padding-top:8px;}
.hf-busca-label{font-size:10px;font-weight:700;color:#6B7280;text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px;display:flex;align-items:center;gap:4px;}
.hf-busca-input{width:100%;font-size:13px;padding:7px 10px;border:1px solid #D1D5DB;border-radius:8px;background:#fff;color:#111827;box-sizing:border-box;}
.hf-busca-input:focus{outline:none;border-color:#2E75B6;box-shadow:0 0 0 3px rgba(46,117,182,.1);}

/* ── LINHA DO TEMPO DE DEFEITO ── */
.def-timeline{margin-top:8px;border-left:2px solid #E5E8ED;padding-left:12px;}
.def-tl-item{position:relative;margin-bottom:10px;}
.def-tl-dot{position:absolute;left:-19px;top:4px;width:12px;height:12px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 0 2px #E5E8ED;background:#9CA3AF;}
.def-tl-dot.dot-em{background:#E65100;box-shadow:0 0 0 2px #FFC947;}
.def-tl-dot.dot-ac{background:#1565C0;box-shadow:0 0 0 2px #90CAF9;}
.def-tl-dot.dot-co{background:#2E7D32;box-shadow:0 0 0 2px #A5D6A7;}
.def-tl-dot.dot-new{background:#1F3864;box-shadow:0 0 0 2px #90CAF9;}
.def-tl-meta{font-size:10px;color:#9CA3AF;margin-bottom:3px;display:flex;align-items:center;gap:5px;}
.def-tl-body{background:#F8F9FB;border:1px solid #E5E8ED;border-radius:7px;padding:8px 10px;font-size:12px;color:#374151;}
.def-tl-tags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:4px;}
.btn-atualizar{display:inline-flex;align-items:center;gap:5px;padding:6px 11px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid #1F3864;background:#EBF3FF;color:#1F3864;margin-top:6px;}
.btn-atualizar:active{background:#D0E8FF;}
.btn-mesclar{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;border:1px dashed #6B7280;background:#fff;color:#6B7280;margin-top:4px;}
.btn-mesclar:active{background:#F3F4F6;}
.mesclar-sel{border:2px solid #2E75B6!important;background:#EBF3FF!important;}
.mesclar-banner{background:#1F3864;color:#fff;border-radius:10px;padding:10px 14px;margin-bottom:10px;display:flex;align-items:center;gap:10px;font-size:13px;font-weight:600;}
.mesclar-banner button{background:rgba(255,255,255,.2);border:none;color:#fff;padding:5px 10px;border-radius:7px;font-size:12px;cursor:pointer;font-weight:600;}
.upd-modal{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:flex;align-items:flex-end;justify-content:center;}
.upd-modal-box{background:#fff;border-radius:16px 16px 0 0;width:100%;max-width:520px;padding:18px 16px 30px;max-height:90vh;overflow-y:auto;}
.upd-modal-titulo{font-size:15px;font-weight:700;color:#1F3864;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;}

/* MENSAGENS RÁPIDAS */
.msgs-rapidas-wrap{margin-bottom:6px;}
.msgs-rapidas-row{display:flex;gap:5px;flex-wrap:wrap;align-items:center;margin-bottom:5px;}
.msg-rap-btn{padding:4px 9px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid #D1D5DB;background:#fff;color:#374151;display:inline-flex;align-items:center;gap:4px;white-space:nowrap;}
.msg-rap-btn:active{background:#F0F0F0;}
.msg-rap-del{background:none;border:none;color:#C62828;font-size:12px;cursor:pointer;padding:0 2px;line-height:1;opacity:.7;}
.msg-rap-del:hover{opacity:1;}
.msg-rap-add{padding:4px 9px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;border:1.5px dashed #2E75B6;background:#EBF3FF;color:#1F3864;display:inline-flex;align-items:center;gap:3px;}
.msg-rap-add:active{background:#D6EAFF;}
.msg-rap-input-row{display:flex;gap:5px;margin-bottom:5px;align-items:center;}
.msg-rap-input-row input{flex:1;font-size:12px;padding:5px 8px;border:1px solid #2E75B6;border-radius:6px;background:#fff;}
.msg-rap-input-row button{padding:5px 10px;font-size:12px;font-weight:700;border-radius:6px;border:none;cursor:pointer;}
.msg-rap-ok{background:#1F3864;color:#fff;}
.msg-rap-cancel{background:#EEF0F3;color:#374151;}

/* ANOTAÇÕES GERAIS */
.anotacao-card{background:#fff;border:1px solid #E5E8ED;border-radius:10px;padding:12px;margin-bottom:8px;}
.anotacao-ativo-badge{display:inline-block;background:#1F3864;color:#fff;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;margin-bottom:7px;}
.anotacao-data{font-size:11px;color:#9CA3AF;margin-bottom:5px;}
.anotacao-desc{font-size:13px;color:#374151;line-height:1.5;white-space:pre-line;}
/* PAGINAÇÃO */
.pag-bar{display:flex;justify-content:center;align-items:center;gap:8px;padding:12px 0;}
.pag-btn{width:34px;height:34px;border-radius:8px;border:1px solid #D1D5DB;background:#fff;font-size:13px;font-weight:600;cursor:pointer;color:#374151;display:flex;align-items:center;justify-content:center;}
.pag-btn.ativo{background:#1F3864;color:#fff;border-color:#1F3864;}
.pag-btn:disabled{opacity:.4;cursor:default;}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-end;}
.modal-overlay.vis{display:flex;}
.modal-box{background:#fff;border-radius:16px 16px 0 0;padding:18px 15px;width:100%;max-height:88vh;overflow-y:auto;}
.modal-titulo{font-size:15px;font-weight:700;color:#1F2937;margin-bottom:13px;display:flex;justify-content:space-between;align-items:center;}
.modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:#6B7280;}
/* TOPBAR EXTRA BUTTONS */
.topbar-actions{display:flex;gap:4px;margin-left:6px;}
.topbar-icon-btn{background:rgba(255,255,255,.18);border:none;color:#fff;width:32px;height:32px;border-radius:7px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.topbar-icon-btn:active{background:rgba(255,255,255,.35);}
/* PRINT */
@media print{
  .topbar,.step-bar,.step-labels,.btn-prim,.btn-sec,.btn-danger,.btn-sm,
  .reg-card-footer,.topbar-actions,#step-bar-wrap,.no-print{display:none!important;}
  body{background:#fff!important;}
  .content{padding:5mm!important;}
  .rel-section{border:1px solid #ccc;border-radius:3px;page-break-inside:avoid;margin-bottom:6px!important;}
  .rel-section-header{background:#1F3864!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;color:#fff!important;}
  .print-oculto{display:none!important;}
  @page{size:A4 portrait;margin:10mm;}
}
/* MODAL IMPRESSÃO */
.print-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:300;align-items:flex-end;}
.print-modal.vis{display:flex;}
.print-modal-box{background:#fff;border-radius:16px 16px 0 0;padding:20px 16px 28px;width:100%;max-height:90vh;overflow-y:auto;}
.print-modal-titulo{font-size:16px;font-weight:700;color:#1F2937;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;}
.print-item{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid #F0F2F5;cursor:pointer;}
.print-item:last-child{border-bottom:none;}
.print-item input[type=checkbox]{width:20px;height:20px;accent-color:#1F3864;flex-shrink:0;cursor:pointer;}
.print-item label{font-size:14px;color:#1F2937;font-weight:500;cursor:pointer;flex:1;}
.print-item .pi-count{font-size:11px;color:#9CA3AF;}
/* SEÇÃO RECOLHÍVEL */
.rel-sec-wrap{background:#fff;border-radius:12px;border:1px solid #E5E8ED;margin-bottom:12px;overflow:hidden;}
.rel-sec-hdr{background:#1F3864;padding:9px 13px;display:flex;align-items:center;gap:8px;user-select:none;}
.rel-sec-hdr.hist-hdr{background:#374151;}
.rel-sec-hdr .rsh-icon{font-size:15px;color:#fff;}
.rel-sec-hdr .rsh-label{flex:1;font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#fff;}
.rel-sec-toggle{background:rgba(255,255,255,.2);border:none;color:#fff;width:22px;height:22px;border-radius:5px;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.rel-sec-chk{width:16px;height:16px;accent-color:#BDD9F8;cursor:pointer;flex-shrink:0;}
.rel-sec-body{padding:10px;}
.rel-sec-body.recolhido{display:none;}
.item-print-row{display:flex;align-items:flex-start;gap:6px;}
.item-print-chk{width:15px;height:15px;accent-color:#1F3864;cursor:pointer;flex-shrink:0;margin-top:2px;}
@media print{
  .rel-sec-toggle,.rel-sec-chk,.item-print-chk,.no-print{display:none!important;}
  .print-item-oculto{display:none!important;}
  .rel-sec-body.recolhido{display:block!important;}
  .rel-sec-wrap{border:1px solid #ccc;border-radius:3px;page-break-inside:avoid;margin-bottom:6px!important;}
  .rel-sec-hdr{background:#1F3864!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
}
</style>

<script>
const hoje = new Date(); hoje.setHours(0,0,0,0);

let ATIVOS=[
  {id:'EP01L',tipo:'Empilhadeira'},{id:'EP01T',tipo:'Empilhadeira'},{id:'EP10',tipo:'Empilhadeira'},
  {id:'RC01',tipo:'Recuperadora'},{id:'RC02A',tipo:'Recuperadora'},
  {id:'TRA01',tipo:'Transportador'},{id:'TRA02',tipo:'Transportador'},{id:'TRA02A',tipo:'Transportador'},
  {id:'TRA02B',tipo:'Transportador'},{id:'TRB03G',tipo:'Transportador'},{id:'TRC06',tipo:'Transportador'},
  {id:'TRF02',tipo:'Transportador'},{id:'TRF06',tipo:'Transportador'},{id:'TRF07',tipo:'Transportador'},
  {id:'TRF08',tipo:'Transportador'},{id:'TRH02',tipo:'Transportador'},{id:'TRH07',tipo:'Transportador'},
  {id:'TRH14',tipo:'Transportador'},{id:'TRH15',tipo:'Transportador'},{id:'TRH16',tipo:'Transportador'},
  {id:'TRH17',tipo:'Transportador'},{id:'TRH18',tipo:'Transportador'},{id:'TRH19',tipo:'Transportador'},
  {id:'TRH20',tipo:'Transportador'},{id:'TRH30',tipo:'Transportador'},{id:'TRN01',tipo:'Transportador'},
  {id:'TRN02',tipo:'Transportador'},{id:'TRN03',tipo:'Transportador'},{id:'TRN04',tipo:'Transportador'},
  {id:'TRT12',tipo:'Transportador'},
];

const RASP_CHAVES=['prim','p2','s1','s2','s3','s4','s5'];
const RASP_LABELS={prim:'Primário (P1)',p2:'Primário (P2)',s1:'Secundário S1',s2:'Secundário S2',s3:'Secundário S3',s4:'Secundário S4',s5:'Secundário S5'};
const LETRAS=['A','B','C','D','E','F','G','H'];
const POR_PAGINA=20;

// DB principal
const DB={registros:{},fichas:{},raspAtivos:{},anotacoesGerais:[],favoritos:new Set(),ativos:null};
// DB.ativos será sincronizado com ATIVOS
ATIVOS.forEach(a=>_initAtivo(a.id));

function _initAtivo(id){
  if(!DB.registros[id]) DB.registros[id]=[];
  if(!DB.fichas[id]) DB.fichas[id]={cod:'',comprimento_total:'',trechos:[{l:'A',de:'',ate:'',comp:'',fab:'',op:'',spec:'',unica:false,uss:Array(21).fill('')}],largura:'',tipo_lona:'lona',cabo_breaker:false,cob_sup:'',cob_inf:'',material:'',obs:'',extrator:{temExtrator:false,largura:'',emenda:'',dataEmenda:'',cantoneiras:''}};
  if(!DB.raspAtivos[id]) DB.raspAtivos[id]={prim:true,p2:false,s1:false,s2:false,s3:false,s4:false,s5:false};
}

let ativoSel=null,fotoB64=null,passo='lista',secaoSel=null,editandoReg=null,regCounter=1,pagAnotacoes=1;
let _defIdx=0;

const SECAO_LABELS={anotacao:'Anotações',contra:'Contrapeso',defeito:'Defeitos/Reparos',desal:'Desalinhamento',interf:'Interferências',rasp:'Raspadores','ext-defeito':'Ext. Defeitos/Reparos','ext-interf':'Ext. Interferências','ext-desal':'Ext. Desalinhamento',...Object.fromEntries((['prim','p2','s1','s2','s3','s4','s5']).map(k=>['rasp-'+k,k==='prim'?'Primário (P1)':k==='p2'?'Primário (P2)':'Secundário '+k.toUpperCase()]))};
const SECAO_ICONS={anotacao:'ti-notes',contra:'ti-adjustments',defeito:'ti-hammer',desal:'ti-arrows-left-right',interf:'ti-alert-triangle',rasp:'ti-tool','ext-defeito':'ti-hammer','ext-interf':'ti-alert-triangle','ext-desal':'ti-arrows-left-right'};
// Ordem alfabética para o menu
const SECOES_MENU=['anotacao','contra','defeito','desal','interf','rasp'];
const SECOES_EXT=['ext-defeito','ext-interf','ext-desal'];

function fmtData(iso){if(!iso)return'—';const[y,m,d]=iso.split('-');return d+'/'+m+'/'+y;}
function dataHojeISO(){return hoje.toISOString().split('T')[0];}
function diasDesde(iso){if(!iso)return null;return Math.round((hoje-new Date(iso+'T00:00:00'))/86400000);}
function iconeAtivo(t){return t==='Empilhadeira'?'ti-forklift':t==='Recuperadora'?'ti-refresh':'ti-engine';}
function newId(){return 'r'+(regCounter++);}
function ultimaAlteracao(id){const r=DB.registros[id];if(!r.length)return null;return r.map(x=>x.data).sort().reverse()[0];}
function pillUltima(id){
  const ult=ultimaAlteracao(id);
  if(!ult)return{cls:'pill-neu',txt:'—'};
  const d=diasDesde(ult);
  if(d===0)return{cls:'pill-blue',txt:'Hoje'};
  if(d<=7)return{cls:'pill-ok',txt:d+'d'};
  if(d<=30)return{cls:'pill-at',txt:d+'d'};
  return{cls:'pill-vn',txt:d+'d'};
}
function ultimoReg(ativoId,tipo){
  const r=DB.registros[ativoId].filter(x=>x.tipo===tipo);
  return r.length?r.sort((a,b)=>b.data.localeCompare(a.data))[0]:null;
}
function ultimoRaspChave(ativoId,chave){
  const r=DB.registros[ativoId].filter(x=>x.tipo==='rasp'&&x.campos&&x.campos[chave]);
  return r.length?r.sort((a,b)=>b.data.localeCompare(a.data))[0]:null;
}

function setTopbar(titulo,sub,back,showPrint){
  document.getElementById('topbar-titulo').textContent=titulo;
  document.getElementById('topbar-sub').textContent=sub||'';
  document.getElementById('btn-voltar').classList.toggle('vis',!!back);
  // Mostrar botão Home em todas as telas exceto a lista principal
  const btnHome=document.getElementById('btn-home');
  if(btnHome)btnHome.style.display=(passo&&passo!=='lista')?'flex':'none';
  document.getElementById('topbar-actions').style.display='flex';
  const dmw=document.getElementById('drive-mem-wrap');if(dmw)dmw.style.display='flex';
  const btnP=document.getElementById('btn-print');
  if(btnP)btnP.style.display=showPrint?'flex':'none';
  const btnS=document.getElementById('btn-share-pdf');
  if(btnS)btnS.style.display=showPrint?'flex':'none';
}
function setStepBar(show,step){
  document.getElementById('step-bar-wrap').style.display=show?'block':'none';
  if(!show)return;
  [1,2,3].forEach(i=>{
    document.getElementById('dot'+i).className='step-dot '+(i<step?'feito':i===step?'ativo':'inativo');
    document.getElementById('dot'+i).textContent=i<step?'✓':String(i);
    document.getElementById('lbl'+i).className='step-lbl'+(i===step?' ativo':'');
    const l=document.getElementById('line'+i);if(l)l.className='step-line'+(i<step?' feito':'');
  });
}

function novoAtivo(){

  if(!nome)return;
  if(ATIVOS.find(a=>a.id===nome)){mostrarToast('Ativo já existe!','#E65100');return;}
  let tipo='Transportador';
  if(nome.startsWith('EP'))tipo='Empilhadeira';
  else if(nome.startsWith('RC'))tipo='Recuperadora';
  ATIVOS.push({id:nome,tipo});
  ATIVOS.sort((a,b)=>a.id.localeCompare(b.id));
  _initAtivo(nome);
  marcarMudanca();autoBackup();
  mostrarToast('✓ Ativo '+nome+' criado!','#2E7D32');

(function limparLSAntigo(){
  try{
    const keys=['inspecao_v3','inspecao_v2','inspecao_v1','insp_db'];
    keys.forEach(k=>{
      if(localStorage.getItem(k)){

// ── Migração: status 'em' → 'ac' em todos os registros ──
(function migrarStatusEm(){
  Object.values(DB.registros).forEach(regs=>{
    regs.forEach(r=>{
      if(r.campos?.status==='em')r.campos.status='ac';
      if(r.tipo==='defeito')(r.campos?.defeitos||[]).forEach(d=>{if(d.status==='em')d.status='ac';});
      (r.campos?.defeitos||[]).forEach(d=>{(d.atualizacoes||[]).forEach(u=>{if(u.status==='em')u.status='ac';});});
    });
  });
})();
renderLista();
}
function editarAtivo(id){
  fecharMenusAtivo();
  const a=ATIVOS.find(x=>x.id===id);if(!a)return;
  const novoNome=(prompt('Novo nome (atual: '+id+'):',id)||'').trim().toUpperCase();
  if(!novoNome||novoNome===id)return;
  if(ATIVOS.find(x=>x.id===novoNome)){mostrarToast('Ativo já existe!','#E65100');return;}
  DB.registros[novoNome]=DB.registros[id]||[];
  DB.fichas[novoNome]=DB.fichas[id]||{};
  DB.raspAtivos[novoNome]=DB.raspAtivos[id]||{prim:true,p2:false,s1:false,s2:false,s3:false,s4:false,s5:false};
  delete DB.registros[id];delete DB.fichas[id];delete DB.raspAtivos[id];
  if(DB.favoritos.has(id)){DB.favoritos.delete(id);DB.favoritos.add(novoNome);}
  if(ativoSel===id)ativoSel=novoNome;
  a.id=novoNome;
  ATIVOS.sort((a,b)=>a.id.localeCompare(b.id));
  marcarMudanca();autoBackup();
  mostrarToast('✓ Renomeado para '+novoNome,'#2E7D32');
  renderLista();
}
function excluirAtivo(id){
  fecharMenusAtivo();
  if(!confirm('Excluir '+id+'?\nTodos os dados serão apagados.'))return;
  ATIVOS.splice(ATIVOS.findIndex(a=>a.id===id),1);
  delete DB.registros[id];delete DB.fichas[id];delete DB.raspAtivos[id];
  DB.favoritos.delete(id);
  if(ativoSel===id)ativoSel=null;
  marcarMudanca();autoBackup();
  mostrarToast('Ativo '+id+' excluído','#6B7280');
  renderLista();
}
function toggleFavorito(id){
  fecharMenusAtivo();
  if(DB.favoritos.has(id))DB.favoritos.delete(id);else DB.favoritos.add(id);
  marcarMudanca();autoBackup();
  renderLista();
}

  let h=`

          <label>Data da inspeção</label>
          <input type="date" id="ag-data" value="${dataHojeISO()}">
        </div>
        <div class="form-grupo">
          <label>Descrição</label>
          <textarea id="ag-desc" placeholder="Descreva a anotação..."></textarea>
        </div>
        ${buildGaleriaField('gal-ag')}

      </div>
    </div>

    <!-- HISTÓRICO -->
    <div class="rel-section">
      <div class="rel-section-header" style="background:#374151;"><i class="ti ti-history"></i> HISTÓRICO DE ANOTAÇÕES</div>
      <div style="padding:10px;">`;

  if(!pagItems.length){
    h+=`<div class="empty-state"><i class="ti ti-notes"></i>Nenhuma anotação registrada</div>`;
  } else {
    pagItems.forEach((an,i)=>{
      const idxGlobal=inicio+i;
      const fotos=an.fotos||[];
      h+=`<div class="anotacao-card">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:6px;">
          <span class="anotacao-ativo-badge">${an.ativo||'—'}</span>
          <div style="display:flex;gap:5px;">
            <button class="btn-sm btn-sm-sec" onclick="abrirEdicaoAnotacao(${idxGlobal})"><i class="ti ti-edit"></i></button>
            <button class="btn-sm btn-sm-danger" onclick="excluirAnotacaoGeral(${idxGlobal})"><i class="ti ti-trash"></i></button>
          </div>
        </div>
        <div class="anotacao-data"><i class="ti ti-calendar" style="vertical-align:-2px;"></i> ${fmtData(an.data)}</div>
        <div class="anotacao-desc">${an.desc}</div>
        ${buildGaleriaDisplay(fotos,'agd-'+idxGlobal)}
      </div>`;
    });
  }

  // Paginação
  if(totalPags>1){
    h+=`<div class="pag-bar">
      <button class="pag-btn" onclick="mudaPagAnotacoes(${pagAnotacoes-1})" ${pagAnotacoes===1?'disabled':''}>‹</button>`;
    for(let p=1;p<=totalPags;p++){
      h+=`<button class="pag-btn ${p===pagAnotacoes?'ativo':''}" onclick="mudaPagAnotacoes(${p})">${p}</button>`;
    }
    h+=`<button class="pag-btn" onclick="mudaPagAnotacoes(${pagAnotacoes+1})" ${pagAnotacoes===totalPags?'disabled':''}>›</button>
    </div>`;
  }

  h+=`</div></div>
    <button class="btn-sec" onclick="renderLista()"><i class="ti ti-arrow-left"></i> Voltar</button>
    <div style="height:20px;"></div>`;

  return h;
}

function salvarAnotacaoGeral(){
  const ativo=(document.getElementById('ag-ativo')?.value||'').trim();
  const data=document.getElementById('ag-data')?.value||dataHojeISO();
  const desc=(document.getElementById('ag-desc')?.value||'').trim();
  if(!desc){alert('Preencha a descrição.');return;}
  const fotos=getGalFotos('gal-ag');
  DB.anotacoesGerais.unshift({ativo,data,desc,fotos});
  resetGal('gal-ag');
  marcarMudanca(); autoBackup();
  agFotoB64='';
  pagAnotacoes=1;
  document.getElementById('content').innerHTML=buildAnotacoesGeraisHtml();setTimeout(()=>renderGaleriaGrid('gal-ag'),0);
  // Feedback
  const btn=document.querySelector('.btn-prim');
  if(btn){const o=btn.innerHTML;btn.innerHTML='<i class="ti ti-check"></i> Salvo!';btn.style.background='#2E7D32';setTimeout(()=>{btn.innerHTML=o;btn.style.background='';},1600);}
}

function excluirAnotacaoGeral(idx){
  if(!confirm('Excluir esta anotação?'))return;
  DB.anotacoesGerais.splice(idx,1);
  if(pagAnotacoes>Math.max(1,Math.ceil(DB.anotacoesGerais.length/POR_PAGINA))) pagAnotacoes=1;
  document.getElementById('content').innerHTML=buildAnotacoesGeraisHtml();setTimeout(()=>renderGaleriaGrid('gal-ag'),0);
}

function mudaPagAnotacoes(p){
  const total=Math.max(1,Math.ceil(DB.anotacoesGerais.length/POR_PAGINA));
  if(p<1||p>total)return;
  pagAnotacoes=p;
  document.getElementById('content').innerHTML=buildAnotacoesGeraisHtml();setTimeout(()=>renderGaleriaGrid('gal-ag'),0);
}

function selSecao(key){secaoSel=key;fotoB64=null;_defIdx=0;_limparFormCompleto();renderForm();}

function galNs(sec){return 'gal-'+sec;}

function renderForm(){
  passo='form';
  // Limpa todas as fotos do formulário anterior
  Object.keys(galFotos).forEach(k=>{
    // Não limpa fotos de modais de edição (prefix 'edit-')
    if(!k.startsWith('edit-')&&!k.startsWith('upd-'))delete galFotos[k];
  });
  setTopbar(ativoSel,SECAO_LABELS[secaoSel],true,false);
  setStepBar(true,3);
  const rU=ultimoReg(ativoSel,secaoSel);
  const hDesc=rU?.desc||'';
  const hData=rU?'(última: '+fmtData(rU.data)+')':'';
  const ns=galNs(secaoSel);
  resetGal(ns);

  let c=`<div class="form-grupo">
    <label>Data da inspeção <span class="lbl-hint">${hData}</span></label>
    <input type="date" id="f-data" value="${dataHojeISO()}">
  </div>`;

  if(secaoSel==='rasp') c+=buildRaspForm();
  else if(secaoSel==='interf'||secaoSel==='ext-interf') c+=buildInterfForm(rU);
  else if(secaoSel==='desal'||secaoSel==='ext-desal') c+=buildDesalForm(rU);
  else if(secaoSel==='contra') c+=buildContraForm(rU);
  else if(secaoSel==='defeito'||secaoSel==='ext-defeito') c+=buildDefeitoForm();
  else if(secaoSel==='anotacao') c+=buildAnotacaoForm(hDesc);

  // Galeria para seções simples (não rasp, defeito, anotacao — elas têm galeria própria)
  if(!['defeito','rasp','anotacao','ext-defeito'].includes(secaoSel)){
    c+=buildGaleriaField(ns);
  }
  c+=`<button class="btn-prim" onclick="salvar()">Salvar registro</button>
      <button class="btn-sec" onclick="renderMenu()"><i class="ti ti-arrow-left"></i> Voltar ao menu</button>`;

  document.getElementById('content').innerHTML=`
    <div class="ativo-banner">
      <i class="ti ${SECAO_ICONS[secaoSel]}" style="font-size:20px;color:#2E75B6;"></i>
      <div><div class="ab-id">${SECAO_LABELS[secaoSel]}</div><div class="ab-nome">${ativoSel}</div></div>
    </div>${c}`;

  // Inicializa grids após DOM render
  const grids=[ns];
  if(secaoSel==='anotacao') grids.push('gal-f-foto-an');
  initGals(...grids);
}

function buildFotoField(fotoId,inpId,prevId){
  // fotoId used as namespace key for the gallery
  return buildGaleriaField(fotoId);

// Redimensiona foto para máx 1920x1080 mantendo proporção, JPEG 90%
function _redimensionarFoto(file, callback){
  const MAX_W=1920, MAX_H=1080, QUALIDADE=0.90;
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      let w=img.width, h=img.height;
      // Calcula novo tamanho mantendo proporção
      if(w>MAX_W||h>MAX_H){
        const ratio=Math.min(MAX_W/w, MAX_H/h);
        w=Math.round(w*ratio);
        h=Math.round(h*ratio);
      }
      // Se já está dentro do limite, só converte para JPEG com qualidade reduzida
      const canvas=document.createElement('canvas');
      canvas.width=w; canvas.height=h;
      const ctx=canvas.getContext('2d');
      ctx.drawImage(img,0,0,w,h);
      callback(canvas.toDataURL('image/jpeg', QUALIDADE));
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

function adicionarFotos(ns,input){
  if(!galFotos[ns])galFotos[ns]=[];
  const files=Array.from(input.files);
  const restante=6-galFotos[ns].length;
  const toAdd=files.slice(0,restante);
  let loaded=0;
  toAdd.forEach(file=>{
    _redimensionarFoto(file, b64=>{
      galFotos[ns].push(b64);
      loaded++;
      if(loaded===toAdd.length) renderGaleriaGrid(ns);
    });
  });
  input.value='';
}

function desgasteCor(p){
  const n=parseInt(p)||0;
  if(n<=30)return{bg:'#C62828',label:'Crítico'};
  if(n<=50)return{bg:'#E65100',label:'Alto'};
  if(n<=75)return{bg:'#F9A825',label:'Médio'};
  return{bg:'#2E7D32',label:'Bom'};
}

function setPct(chave, val, btn){
  const inp=document.getElementById('f-pct-'+chave);
  if(inp)inp.value=val;
  // Desmarca outros botões da faixa
  [0,1,2,3].forEach(i=>{const b=document.getElementById('pct-btn-'+chave+'-'+i);if(b)b.classList.remove('btn-opcao-ativo');});
  if(btn)btn.classList.add('btn-opcao-ativo');
  atualizarBarraRasp(chave);
}

function atualizarBarraRasp(chave){
  const val=parseInt(document.getElementById('f-pct-'+chave)?.value)||0;
  const barra=document.getElementById('barra-rasp-'+chave);
  const label=document.getElementById('barra-label-'+chave);
  if(!barra)return;
  const cor=desgasteCor(val);
  barra.style.width=Math.min(val,100)+'%';
  barra.style.background=val>0?cor.bg:'#E5E8ED';
  if(label)label.textContent=val>0?val+'% — '+cor.label:'';
}

function toggleRasp(chave){
  DB.raspAtivos[ativoSel][chave]=!DB.raspAtivos[ativoSel][chave];
  fotoB64=null;renderForm();
}

// ── Mensagens Rápidas ──────────────────────────────────────────────────────
// ── Mensagens Rápidas POR SEÇÃO ────────────────────────────────────────────
// Cada seção tem sua própria lista no localStorage
// Chaves: insp_msgs_rasp, insp_msgs_defeito, insp_msgs_interf,
//         insp_msgs_desal, insp_msgs_contra, insp_msgs_anotacao, insp_msgs_upd
const MAX_MSGS=5;
function _msgsKey(secao){return 'insp_msgs_'+(secao||'geral');}
function getMsgsRapidas(secao){
  try{return JSON.parse(localStorage.getItem(_msgsKey(secao))||'[]');}catch{return[];}
}
function saveMsgsRapidas(arr,secao){
  try{localStorage.setItem(_msgsKey(secao),JSON.stringify(arr));}catch{}
}
function buildMsgsRapidas(targetId,secao){
  const uid='mr-'+targetId.replace(/[^a-z0-9]/gi,'-');
  const sec=secao||'geral';
  return `<div class="msgs-rapidas-wrap" id="${uid}-wrap" data-secao="${sec}">
    ${_renderMsgsRows(targetId,uid,sec)}
  </div>`;
}
function _renderMsgsRows(targetId,uid,secao){
  const sec=secao||document.getElementById(uid+'-wrap')?.dataset?.secao||'geral';
  const msgs=getMsgsRapidas(sec);
  const pode=msgs.length<MAX_MSGS;
  let h='<div class="msgs-rapidas-row">';
  h+=`<button type="button" class="msg-rap-btn" onclick="usarMsgRapida('${targetId}','Sem relato')">Sem relato</button>`;
  msgs.forEach((m,i)=>{
    const esc=m.replace(/'/g,"\'");
    h+=`<span style="display:inline-flex;align-items:center;gap:0px;border:1px solid #D1D5DB;border-radius:6px;background:#fff;overflow:hidden;">
      <button type="button" class="msg-rap-btn" style="border:none;border-radius:0;" onclick="usarMsgRapida('${targetId}','${esc}')">${m}</button>
      <button type="button" class="msg-rap-del" onclick="delMsgRapida(${i},'${targetId}','${uid}','${sec}')" title="Remover">✕</button>
    </span>`;
  });
  if(pode) h+=`<button type="button" class="msg-rap-add" onclick="showAddMsg('${targetId}','${uid}','${sec}')"><i class="ti ti-plus" style="font-size:12px;"></i></button>`;
  h+='</div>';
  h+=`<div id="${uid}-addinput" style="display:none;" class="msg-rap-input-row">
    <input type="text" id="${uid}-newinput" placeholder="Nova mensagem rápida..." maxlength="60" onkeydown="if(event.key==='Enter')confirmAddMsg('${targetId}','${uid}','${sec}')">
    <button class="msg-rap-ok" onclick="confirmAddMsg('${targetId}','${uid}','${sec}')">OK</button>
    <button class="msg-rap-cancel" onclick="cancelAddMsg('${uid}')">✕</button>
  </div>`;
  return h;
}
function usarMsgRapida(targetId,msg){
  const el=document.getElementById(targetId);
  if(!el)return;
  el.value=msg;
  el.style.color=msg==='Sem relato'?'#9CA3AF':'';
}
function delMsgRapida(idx,targetId,uid,secao){
  const arr=getMsgsRapidas(secao);
  arr.splice(idx,1);
  saveMsgsRapidas(arr,secao);
  const wrap=document.getElementById(uid+'-wrap');
  if(wrap)wrap.innerHTML=_renderMsgsRows(targetId,uid,secao);
}
function showAddMsg(targetId,uid,secao){
  const row=document.getElementById(uid+'-addinput');
  if(row){row.style.display='flex';setTimeout(()=>document.getElementById(uid+'-newinput')?.focus(),50);}
}
function cancelAddMsg(uid){
  const row=document.getElementById(uid+'-addinput');
  if(row)row.style.display='none';
}
function confirmAddMsg(targetId,uid,secao){
  const inp=document.getElementById(uid+'-newinput');
  const val=(inp?.value||'').trim();
  if(!val)return;
  const arr=getMsgsRapidas(secao);
  if(arr.length>=MAX_MSGS){cancelAddMsg(uid);return;}
  arr.push(val);
  saveMsgsRapidas(arr,secao);
  const wrap=document.getElementById(uid+'-wrap');
  if(wrap)wrap.innerHTML=_renderMsgsRows(targetId,uid,secao);
}
// ── buildDescGroup ──────────────────────────────────────────────────────────
function buildDescGroup(id,ultimoRelato,secao){
  const tem=!!ultimoRelato;
  const sec=secao||secaoSel||'geral';
  const copiarBtn=tem?`<button type="button" class="desc-opt-btn blue" onclick="copiarRelato('${id}','${ultimoRelato.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,' ')}')">↩ Copiar último</button>`:'';
  return `<div class="form-grupo">
    <label>Descrição ${tem?'<span class="lbl-hint">(último: '+ultimoRelato.substring(0,25)+(ultimoRelato.length>25?'...':'')+')</span>':''}</label>
    ${buildMsgsRapidas(id,sec)}
    ${copiarBtn?'<div class="desc-opts">'+copiarBtn+'</div>':''}
    <textarea id="${id}" placeholder="Descreva a condição..."></textarea>
  </div>`;
}
function usarSemRelato(id){const el=document.getElementById(id);if(el){el.value='Sem relato';el.style.color='#9CA3AF';}}
function copiarRelato(id,txt){const el=document.getElementById(id);if(el){el.value=txt;el.style.color='';}}

function carregarFoto(input,prevId){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    if(prevId==='f-foto-prev') fotoB64=e.target.result;
    const img=document.getElementById(prevId);
    if(img){img.src=e.target.result;img.style.display='block';}
    input.dataset.b64=e.target.result;
  };
  reader.readAsDataURL(file);
}

// SALVAR
// ════════════════════════════════
function salvar(){
  const data=document.getElementById('f-data')?.value||dataHojeISO();

  // ANOTAÇÃO → vai para anotações gerais do ativo
  if(secaoSel==='anotacao'){
    const desc=(document.getElementById('f-desc')?.value||'').trim();
    if(!desc){alert('Preencha a descrição ou use "Sem relato".');return;}
    const fotos=getGalFotos('gal-anotacao');
    DB.anotacoesGerais.unshift({ativo:ativoSel,data,desc,fotos});
    galFotos['gal-anotacao']=[];
    renderSucesso({id:newId(),tipo:'anotacao',data,desc,fotos,campos:{}});
    return;
  }

  if(secaoSel==='rasp'){
    const ativosR=DB.raspAtivos[ativoSel];
    RASP_CHAVES.forEach(k=>{
      if(!ativosR[k])return;
      const desc=(document.getElementById('f-desc-'+k)?.value||'').trim();
      const pct=document.getElementById('f-pct-'+k)?.value||'';
      const crit=document.getElementById('rcrit-'+k)?.value||'';
      const fotos=getGalFotos('gal-rasp-'+k);
      // Só cria registro se preencheu algo
      const fotosNovas=fotos.filter(f=>f);
      if(!desc&&!pct&&!crit&&!fotosNovas.length) return; // nada preenchido → mantém o registro ativo anterior intacto

      // Inserir em anotações se marcado
      const addAnot=document.getElementById('rasp-'+k+'-add-anotacao')?.value==='1';
      if(addAnot&&desc&&desc!=='Sem relato'){
        const partes=[];
        if(pct)partes.push('%Desgaste: '+pct+'%');
        if(crit)partes.push('Criticidade: '+crit);
        DB.anotacoesGerais.unshift({ativo:ativoSel,data,desc:'[Raspador — '+RASP_LABELS[k]+(partes.length?' — '+partes.join(' / '):'')+']\n\nDescrição: '+desc,fotos:[...fotos]});
      }
      // Só move para histórico APÓS confirmar que há dados novos para criar registro
      const regs=DB.registros[ativoSel];
      const idxAtivo=regs.findIndex(r=>r.tipo==='rasp-'+k&&!r._hist&&!r._encerrado);
      if(idxAtivo>=0) regs[idxAtivo]._hist=true;
      // Cria novo registro individual por componente
      const reg={id:newId(),tipo:'rasp-'+k,data,desc:desc||'Sem relato',fotos,campos:{pct,crit},_hist:false};
      DB.registros[ativoSel].unshift(reg);
    });
    renderSucesso({id:newId(),tipo:'rasp',data,desc:'Inspeção de raspadores',fotos:[],campos:{}});return;
  }

  if(secaoSel==='defeito'||secaoSel==='ext-defeito'){
    const cards=document.querySelectorAll('[id^="card-def-"]');
    const defeitos=[];
    cards.forEach(card=>{
      const id=card.id.replace('card-','');
      const tipo=document.getElementById(id+'-tipo-loc')?.value||'';
      const dataEmenda=(tipo==='emenda'||tipo==='ambos')?(document.getElementById(id+'-data-emenda')?.value||''):'';
      const fotos=getGalFotos('gal-'+id);
      const desc=(document.getElementById(id+'-desc')?.value||'').trim()||'Sem relato';
      const addAnotacao=document.getElementById(id+'-add-anotacao')?.value==='1';
      // Se marcou "Inserir em Anotações", salva também nas anotações gerais
      if(addAnotacao && desc && desc!=='Sem relato'){
        const locLabel=document.getElementById(id+'-loc')?.value||'';
        const critLabel=document.getElementById(id+'-crit')?.value||'';
        const statusLabel={em:'Acompanhando',ac:'Acompanhando',co:'Concluído'}[document.getElementById(id+'-status')?.value||'ac']||'';
        const partes=[];
        if(locLabel)    partes.push('Local: '+locLabel);
        if(critLabel)   partes.push('Criticidade: '+critLabel);
        if(statusLabel) partes.push('Status: '+statusLabel);
        const cabecalho='[Defeito/Reparo'+(partes.length?' — '+partes.join(' / '):'')+']';
        DB.anotacoesGerais.unshift({ativo:ativoSel, data, desc:cabecalho+'\n\nDescrição: '+desc, fotos:[...fotos]});
      }
      defeitos.push({
        tipo, dataEmenda,
        loc:document.getElementById(id+'-loc')?.value||'',
        novo:document.getElementById(id+'-novo')?.checked||false,
        crit:document.getElementById(id+'-crit')?.value||'',
        status:document.getElementById(id+'-status')?.value||'ac',
        desc, fotos
      });
    });
    const reg={id:newId(),tipo:secaoSel,data,desc:SECAO_LABELS[secaoSel]||'Defeitos/Reparos',fotos:[],campos:{defeitos}};
    DB.registros[ativoSel].unshift(reg);
    renderSucesso(reg);return;
  }

  const desc=(document.getElementById('f-desc')?.value||'').trim();
  if(!desc){alert('Preencha a descrição ou use "Sem relato".');return;}
  const fotos=getGalFotos(galNs(secaoSel));
  const reg={id:newId(),tipo:secaoSel,data,desc,fotos,campos:{}};

  // Extrator mapeia para mesmos handlers mas com tipo diferente
  const _tipoBase=secaoSel.replace('ext-','');
  const _isExt=secaoSel.startsWith('ext-');
  if(secaoSel==='interf'||secaoSel==='ext-interf'){
    let tipo=document.getElementById('f-tipo-interf')?.value||'';
    if(tipo==='outros')tipo=document.getElementById('f-tipo-outros')?.value||'Outros';
    const intCrit=document.getElementById('interf-crit')?.value||'';
    const intStatus=document.getElementById('interf-status')?.value||'ac';
    reg.campos={tipo,bal:document.getElementById('f-bal')?.value||'',crit:intCrit,status:intStatus};
    reg.tipo=secaoSel; // preserva ext-interf ou interf
    // Inserir em anotações
    if(document.getElementById('interf-add-anotacao')?.value==='1'&&desc&&desc!=='Sem relato'){
      const partes=[];
      if(tipo)partes.push('Tipo: '+tipo);
      if(intCrit)partes.push('Criticidade: '+intCrit);
      const stLbl={ac:'Acompanhando',co:'Concluído',em:'Em andamento'}[intStatus]||'';
      if(stLbl)partes.push('Status: '+stLbl);
      const bal=document.getElementById('f-bal')?.value||'';
      if(bal)partes.push('Baliza: '+bal);
      DB.anotacoesGerais.unshift({ativo:ativoSel,data,desc:'[Interferência'+(partes.length?' — '+partes.join(' / '):'')+']\n\nDescrição: '+desc,fotos:[...fotos]});
    }
  }
  if(secaoSel==='desal'||secaoSel==='ext-desal'){
    const dsCrit=document.getElementById('desal-crit')?.value||'';
    const dsStatus=document.getElementById('desal-status')?.value||'ac';
    reg.campos={local:document.getElementById('f-local')?.value||'',crit:dsCrit,status:dsStatus};
    reg.tipo=secaoSel; // preserva ext-desal ou desal
    // Inserir em anotações
    if(document.getElementById('desal-add-anotacao')?.value==='1'&&desc&&desc!=='Sem relato'){
      const partes=[];
      if(dsCrit)partes.push('Criticidade: '+dsCrit);
      const stLbl={ac:'Acompanhando',co:'Concluído',em:'Em andamento'}[dsStatus]||'';
      if(stLbl)partes.push('Status: '+stLbl);
      const bal=document.getElementById('f-local')?.value||'';
      if(bal)partes.push('Local: '+bal);
      DB.anotacoesGerais.unshift({ativo:ativoSel,data,desc:'[Desalinhamento'+(partes.length?' — '+partes.join(' / '):'')+']\n\nDescrição: '+desc,fotos:[...fotos]});
    }
  }
  if(secaoSel==='contra')reg.campos={pos:document.getElementById('f-pos')?.value||''};

  DB.registros[ativoSel].unshift(reg);
  renderSucesso(reg);
}

function _limparFormCompleto(){
  // Limpa todos os galFotos do formulário (não de edição)
  Object.keys(galFotos).forEach(k=>{
    if(!k.startsWith('edit-')&&!k.startsWith('upd-'))delete galFotos[k];
  });
  // Limpa campos de texto, selects e hidden
  document.querySelectorAll(
    '#content textarea, #content input[type=text], #content input[type=number], #content input[type=date]'
  ).forEach(el=>{ if(!el.closest('.modal-edit'))el.value=''; });
  // Limpa botões de opção selecionados
  document.querySelectorAll('#content .btn-opcao-ativo').forEach(el=>el.classList.remove('btn-opcao-ativo'));
  // Limpa hidden values de status/criticidade/etc
  document.querySelectorAll('#content input[type=hidden]').forEach(el=>{
    if(!el.closest('.modal-edit'))el.value='';
  });
}

      ${isAnotacao?`<button class="btn-prim" onclick="renderAnotacoesGerais()"><i class="ti ti-notebook"></i> Ver Anotações Gerais</button>`:`<button class="btn-prim" onclick="selSecao('${secaoSel}')">Registrar outra — ${SECAO_LABELS[secaoSel]}</button>`}
      <button class="btn-sec" onclick="renderMenu()">Voltar ao menu do ativo</button>
      ${!isAnotacao?`<button class="btn-sec" onclick="renderRelatorio()"><i class="ti ti-clipboard-data"></i> Ver relatório</button>`:''}
    </div>`;
}

// RELATÓRIO
// ════════════════════════════════
function renderRelatorio(){
  passo='relatorio';
  setTopbar('Relatório',ativoSel,true,true);
  setStepBar(false);
  const ficha=DB.fichas[ativoSel];
  const TIPOS_BASE=['anotacao','contra','defeito','desal','interf'];
  const RASP_K_TIPOS=RASP_CHAVES.map(k=>'rasp-'+k);
  const EXT_TIPOS=['ext-defeito','ext-interf','ext-desal'];
  const TODOS_TIPOS=[...TIPOS_BASE,...RASP_K_TIPOS,...EXT_TIPOS];

  // Separa ativos vs histórico
  const ativos={},hist={};
  TODOS_TIPOS.forEach(t=>{ativos[t]=[];hist[t]=[];});
  DB.registros[ativoSel].forEach(r=>{
    if(!TODOS_TIPOS.includes(r.tipo))return;
    // Para defeitos: vai pro histórico só se TODOS estiverem encerrados (ou _encerrado geral)
    const conc=r._hist||r._encerrado;
    // Para defeitos com mistura ativo/encerrado, o registro fica nos ativos mas mostra os encerrados no hist inline
    if(conc)hist[r.tipo].push(r);else ativos[r.tipo].push(r);
  });

  // ── FICHA TÉCNICA ──
  if(!ficha.trechos[0]?.uss){ficha.trechos.forEach(t=>{t.uss=Array(21).fill('');t.fab=t.fab||t.med||'';t.spec=t.spec||'';t.unica=t.unica||false;});}
  const temUss=ficha.trechos.some(t=>(t.uss||[]).some(v=>v));
  const temFicha=ficha.comprimento_total||ficha.cod||ficha.largura||ficha.material||temUss||ficha.trechos.some(t=>t.comp||t.de||t.fab||t.spec);
  let fichaBody='';
  if(!temFicha){fichaBody=`<div class="empty-state"><i class="ti ti-table"></i>Não preenchida</div>`;}
  else{
    if(ficha.comprimento_total||ficha.cod)fichaBody+=`<div class="rel-ficha-row"><div class="rel-ficha-label">Comprimento</div><div class="rel-ficha-val">${ficha.comprimento_total||'—'} m</div><div class="rel-ficha-label">COD</div><div class="rel-ficha-val">${ficha.cod||'—'}</div></div>`;
    const tC=ficha.trechos.filter(t=>t.de||t.comp||t.fab||t.spec||(t.uss||[]).some(v=>v));
    if(tC.length){
      fichaBody+=`<div style="overflow-x:auto;"><table class="ficha-table"><tr><th>Trecho</th><th>De</th><th>Até</th><th>Comp.(m)</th><th>Fabricante</th><th>OP</th><th>Especificação</th><th>Única</th></tr>`;
      tC.forEach(t=>{fichaBody+=`<tr><td class="lbl trecho-header">${t.l}</td><td>${t.de||'—'}</td><td>${t.ate||'—'}</td><td>${t.comp||'—'}</td><td>${t.fab||t.med||'—'}</td><td>${t.op||'—'}</td><td>${t.spec||'—'}</td><td>${t.unica?'✓':''}</td></tr>`;});
      fichaBody+=`</table></div>`;
    }
    // USS — único bloco recolhido dentro da ficha
    const temUssData=ficha.trechos.some(t=>(t.uss||[]).some(v=>v));
    if(temUssData){
      let ussInner='';
      ficha.trechos.forEach((t,idx)=>{
        const ussV=t.uss||Array(21).fill('');

        const l=t.l||LETRAS[idx]||String(idx+1);
        const uid='uss-tr-'+idx;
        let grid='<div class="uss-grid" style="padding:6px 0 4px;">';
        for(let j=0;j<21;j++){
          const n=String(j+1).padStart(2,'0');
          grid+='<div class="uss-cell"><div class="uss-num">'+n+'</div>'
            +'<div style="font-size:12px;padding:6px 2px;border:1px solid #E5E8ED;border-radius:5px;text-align:center;background:#F8F9FB;">'+(ussV[j]||'—')+'</div></div>';
        }
        grid+='</div>';
        ussInner+=`<div style="border-top:1px solid #F0F2F5;margin-top:2px;">

            <button class="rel-sec-toggle no-print" id="${uid}-btn" style="background:#EEF0F3;color:#374151;width:20px;height:20px;font-size:12px;">+</button>
          </div>
          <div id="${uid}" style="display:none;">${grid}</div>
        </div>`;
      });
      fichaBody+=`<div style="border-top:1px solid #E5E8ED;margin-top:8px;">
        <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;cursor:pointer;" onclick="toggleUssRelFicha()">
          <span style="font-size:11px;font-weight:700;color:#1F3864;display:flex;align-items:center;gap:6px;"><i class="ti ti-wave-sine"></i> MEDIDAS DE ULTRASSOM</span>
          <button class="rel-sec-toggle no-print" id="uss-ficha-btn" style="background:#EEF0F3;color:#374151;">+</button>
        </div>
        <div id="uss-ficha-body" style="display:none;padding:0 4px;">${ussInner}</div>
      </div>`;
    }
    const tipoLona=ficha.tipo_lona||'lona';
    if(ficha.largura||ficha.cob_sup)fichaBody+=`<div class="rel-ficha-row"><div class="rel-ficha-label">Largura</div><div class="rel-ficha-val">${ficha.largura||'—'} mm</div><div class="rel-ficha-label">Tipo</div><div class="rel-ficha-val">${tipoLona==='cabo'?'Cabo de aço'+(ficha.cabo_breaker?' + Breaker':''):'Lona'}</div></div>`;
    if(ficha.cob_sup||ficha.cob_inf)fichaBody+=`<div class="rel-ficha-row"><div class="rel-ficha-label">Cob. Superior</div><div class="rel-ficha-val">${ficha.cob_sup||'—'}</div><div class="rel-ficha-label">Cob. Inferior</div><div class="rel-ficha-val">${ficha.cob_inf||'—'}</div></div>`;
    if(ficha.material)fichaBody+=`<div class="rel-ficha-row"><div class="rel-ficha-label">Material</div><div class="rel-ficha-val">${ficha.material}</div></div>`;
    if(ficha.obs)fichaBody+=`<div class="rel-ficha-row"><div class="rel-ficha-label">Obs.</div><div class="rel-ficha-val" style="white-space:pre-line;">${ficha.obs}</div></div>`;
    fichaBody+=`<div style="padding:8px;"><button class="btn-sec no-print" onclick="renderFicha()"><i class="ti ti-edit"></i> Editar ficha</button></div>`;
  }
  const fichaHtml=buildSecaoRel('ficha','ti-table','FICHA TÉCNICA — '+ativoSel,fichaBody,false,'');


  const ussHtml=''; // USS now inside fichaBody


  // ── RASPADORES (por componente) ──
  const raspAtiv=DB.raspAtivos[ativoSel];
  let raspBody='';
  let temRasp=false;
  RASP_CHAVES.forEach(k=>{
    const tipo='rasp-'+k;
    const regsK=ativos[tipo];
    if(!raspAtiv[k]&&!regsK.length) return;
    temRasp=true;
    const label=SECAO_LABELS[tipo];
    const r=regsK[0]; // apenas 1 ativo
    if(r){
      raspBody+=buildRegCard(r,false);
    } else {
      raspBody+=`<div style="font-size:12px;color:#9CA3AF;padding:8px 0;">${label} — sem registro</div>`;
    }
  });
  const raspHtml=temRasp?buildSecaoRel('rasp','ti-tool','RASPADORES',raspBody,false,''):'';

  // ── OUTRAS SEÇÕES ──
  let regsHtml='';
  TIPOS_BASE.forEach(tipo=>{
    if(!ativos[tipo].length)return;
    let body='';
    ativos[tipo].forEach(r=>{body+=buildRegCard(r,false);});
    regsHtml+=buildSecaoRel('reg-'+tipo,SECAO_ICONS[tipo],SECAO_LABELS[tipo].toUpperCase(),body,false,'');
  });

  // ── EXTRATOR DE SUCATAS ──────────────────────────────────────────────────
  let extRelHtml='';
  const temExt=EXT_TIPOS.some(t=>(ativos[t]||[]).length);
  if(temExt){
    let extBody='';
    EXT_TIPOS.forEach(tipo=>{
      if(!(ativos[tipo]||[]).length)return;
      const subId='ativo-ext-'+tipo;
      let cardsH=`<div id="${subId}-cards">`;
      ativos[tipo].forEach(r=>cardsH+=buildRegCard(r,false));
      cardsH+='</div>';
      extBody+=`<div style="border:1px solid #FFCCBC;border-radius:8px;overflow:hidden;margin-bottom:8px;">
        <div style="display:flex;align-items:center;justify-content:space-between;padding:9px 12px;background:#FFF3E0;cursor:pointer;" onclick="toggleHistSub('${subId}')">
          <span style="font-size:12px;font-weight:700;color:#E65100;flex:1;">${SECAO_LABELS[tipo].replace('Ext. ','')}</span>
          <div style="display:flex;align-items:center;gap:6px;">
            <span style="font-size:11px;background:#FFE0B2;color:#E65100;padding:2px 7px;border-radius:10px;">${ativos[tipo].length}</span>

          </div>
        </div>
        <div id="${subId}" style="display:none;padding:8px 8px 4px;">${cardsH}</div>
      </div>`;
    });
    // Seção começa recolhida (body oculto), abre com +
    extRelHtml=`<div class="rel-sec-wrap" id="sec-wrap-extrator">
      <div class="rel-sec-hdr" style="background:#E65100;" onclick="toggleSecaoExt()">
        <i class="ti ti-trash rsh-icon"></i>
        <span class="rsh-label">EXTRATOR DE SUCATAS</span>
        <button class="rel-sec-toggle no-print" id="sec-btn-extrator" style="background:rgba(255,255,255,.2);color:#fff;">+</button>
      </div>
      <div class="rel-sec-body" id="sec-body-extrator" style="display:none;">${extBody}</div>
    </div>`;
  }
  // ── HISTÓRICO EXTRATOR ───────────────────────────────────────────────────
  let extHistHtml='';
  const temExtHist=EXT_TIPOS.some(t=>(hist[t]||[]).length);
  if(temExtHist){
    let extHistBody='';
    EXT_TIPOS.forEach(tipo=>{
      if(!(hist[tipo]||[]).length)return;
      const lim=100;const regs=hist[tipo]||[];
      const subId='hist-ext-'+tipo;
      const filtroLocal=buildFiltroLocalHist(subId,tipo,regs);
      let cardsH=`<div id="${subId}-cards">`;
      regs.slice(0,lim).forEach(r=>{cardsH+=buildRegCard(r,true);});
      cardsH+='</div>';
      extHistBody+=`<div style="border:1px solid #FFCCBC;border-radius:8px;overflow:hidden;margin-bottom:8px;">
        <div style="display:flex;align-items:center;justify-content:space-between;padding:9px 12px;background:#FFF3E0;cursor:pointer;" onclick="toggleHistSub('${subId}')">
          <span style="font-size:12px;font-weight:700;color:#E65100;flex:1;">${SECAO_LABELS[tipo].replace('Ext. ','')}</span>
          <div style="display:flex;align-items:center;gap:6px;">
            <span style="font-size:11px;color:#6B7280;background:#FFE0B2;padding:2px 7px;border-radius:10px;" id="${subId}-count">${Math.min(regs.length,lim)}/${lim}</span>
            <button onclick="event.stopPropagation();toggleHistSub('${subId}');toggleFiltroLocal('${subId}')" style="background:#FFE0B2;border:none;color:#E65100;width:26px;height:22px;border-radius:5px;cursor:pointer;"><i class="ti ti-filter" style="font-size:11px;"></i></button>
            <button class="rel-sec-toggle" id="${subId}-btn" style="width:22px;height:22px;font-size:13px;background:#FFE0B2;color:#E65100;" onclick="toggleHistSub('${subId}')">+</button>
          </div>
        </div>
        <div id="${subId}" style="display:none;">${filtroLocal}${cardsH}</div>
      </div>`;
    });
    extHistHtml=buildSecaoRel('ext-hist','ti-trash','HISTÓRICO — EXTRATOR DE SUCATAS',extHistBody,true,'');
  }

  // ── HISTÓRICO — subitens colapsáveis, limites, contagem e filtros ──
  let histHtml='';
  const HIST_LIMITS={defeito:100,interf:100,desal:100,'rasp-prim':100,'rasp-p2':100,'rasp-s1':100,'rasp-s2':100,'rasp-s3':100,'rasp-s4':100,'rasp-s5':100};
  const temHist=[...TODOS_TIPOS].some(t=>hist[t].length);
  if(temHist){
    // Filtro geral (valores atuais — atualizados por aplicarFiltroHist)
    const filtroGeral=buildFiltroGeralHist();
    let histBody=filtroGeral;

    // ── Raspadores: grupo com subitens ──
    const raspHistKeys=RASP_CHAVES.filter(k=>hist['rasp-'+k].length);
    if(raspHistKeys.length){
      const raspSubId='hist-rasp-sub';
      let raspSubBody='';
      raspHistKeys.forEach(k=>{
        const tipo='rasp-'+k;
        const regs=hist[tipo];
        const lim=HIST_LIMITS[tipo]||100;
        const subId='hist-'+tipo.replace('-','_');
        const filtroLocal=buildFiltroLocalHist(subId,'rasp',regs);
        let cardsH=`<div id="${subId}-cards">`;
        regs.slice(0,lim).forEach(r=>{cardsH+=buildRegCard(r,true);});
        cardsH+='</div>';
        raspSubBody+=`<div style="border-top:1px solid #F0F2F5;">
          <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:#F8F9FB;">
            <span style="font-size:12px;font-weight:700;color:#1F3864;cursor:pointer;flex:1;" onclick="toggleHistSub('${subId}')">${SECAO_LABELS[tipo]}</span>
            <div style="display:flex;align-items:center;gap:6px;">
              <span style="font-size:11px;color:#6B7280;background:#E5E8ED;padding:2px 7px;border-radius:10px;" id="${subId}-count">${Math.min(regs.length,lim)}/${lim}</span>
              <button onclick="event.stopPropagation();toggleHistSub('${subId}');toggleFiltroLocal('${subId}')" style="background:#EBF3FF;border:none;color:#1F3864;width:26px;height:22px;border-radius:5px;font-size:11px;cursor:pointer;" title="Filtrar"><i class="ti ti-filter" style="font-size:11px;"></i></button>
              <button class="rel-sec-toggle" id="${subId}-btn" style="width:22px;height:22px;font-size:13px;background:#E5E8ED;color:#374151;" onclick="toggleHistSub('${subId}')">+</button>
            </div>
          </div>
          <div id="${subId}" style="display:none;">${filtroLocal}${cardsH}</div>
        </div>`;
      });
      histBody+=`<div style="border:1px solid #E5E8ED;border-radius:8px;overflow:hidden;margin-bottom:8px;">
        <div style="display:flex;align-items:center;justify-content:space-between;padding:9px 12px;background:#EBF3FF;cursor:pointer;" onclick="toggleHistSub('${raspSubId}')">
          <span style="font-size:12px;font-weight:700;color:#1F3864;display:flex;align-items:center;gap:6px;"><i class="ti ti-tool"></i> RASPADORES</span>
          <button class="rel-sec-toggle" id="${raspSubId}-btn" style="width:22px;height:22px;font-size:13px;background:#C5D8F0;color:#1F3864;">+</button>
        </div>
        <div id="${raspSubId}" style="display:none;">${raspSubBody}</div>
      </div>`;
    }

    // ── Outros tipos com subitens ──
    TIPOS_BASE.forEach(tipo=>{
      if(!hist[tipo].length)return;
      const lim=HIST_LIMITS[tipo]||100;
      const regs=hist[tipo];
      const subId='hist-'+tipo;
      const filtroLocal=buildFiltroLocalHist(subId,tipo,regs);
      let cardsH=`<div id="${subId}-cards">`;
      regs.slice(0,lim).forEach(r=>{cardsH+=buildRegCard(r,true);});
      cardsH+='</div>';
      histBody+=`<div style="border:1px solid #E5E8ED;border-radius:8px;overflow:hidden;margin-bottom:8px;">
        <div style="display:flex;align-items:center;justify-content:space-between;padding:9px 12px;background:#F8F9FB;">
          <span style="font-size:12px;font-weight:700;color:#1F3864;display:flex;align-items:center;gap:6px;cursor:pointer;flex:1;" onclick="toggleHistSub('${subId}')">
            <i class="ti ${SECAO_ICONS[tipo]||'ti-file'}"></i> ${SECAO_LABELS[tipo].toUpperCase()}
          </span>
          <div style="display:flex;align-items:center;gap:6px;">
            <span style="font-size:11px;color:#6B7280;background:#E5E8ED;padding:2px 7px;border-radius:10px;" id="${subId}-count">${Math.min(regs.length,lim)}/${lim}</span>
            <button onclick="event.stopPropagation();toggleHistSub('${subId}');toggleFiltroLocal('${subId}')" style="background:#EBF3FF;border:none;color:#1F3864;width:26px;height:22px;border-radius:5px;cursor:pointer;" title="Filtrar"><i class="ti ti-filter" style="font-size:11px;"></i></button>
            <button class="rel-sec-toggle" id="${subId}-btn" style="width:22px;height:22px;font-size:13px;background:#E5E8ED;color:#374151;" onclick="toggleHistSub('${subId}')">+</button>
          </div>
        </div>
        <div id="${subId}" style="display:none;">${filtroLocal}${cardsH}</div>
      </div>`;
    });

    histHtml=buildSecaoRel('hist','ti-history','HISTÓRICO DE REGISTROS',histBody,true,'hist-hdr');
  }

  if(!regsHtml&&!raspHtml) regsHtml=`<div class="rel-sec-wrap"><div class="empty-state" style="padding:18px;"><i class="ti ti-clipboard-x"></i>Nenhum registro ativo</div></div>`;

  document.getElementById('content').innerHTML=`
    <button class="btn-prim no-print" style="margin-bottom:12px;" onclick="renderMenu()"><i class="ti ti-plus"></i> Novo registro</button>
    ${fichaHtml}${ussHtml}
    <div class="bloco-titulo no-print" style="margin-top:4px;">Registros ativos</div>
    ${raspHtml}${regsHtml}${extRelHtml}${extHistHtml}${histHtml}
    <button class="btn-sec no-print" onclick="renderMenu()"><i class="ti ti-arrow-left"></i> Menu do ativo</button>
    <div style="height:24px;"></div>`;

}

// Constrói uma seção recolhível com checkbox de impressão
function buildSecaoRel(uid,icon,titulo,body,isHist,extraHdrClass){
  const bodyId='sec-body-'+uid;
  const chkId='sec-chk-'+uid;
  const filtroBtnHtml=isHist?`<button class="rel-sec-toggle no-print" id="sec-filtro-${uid}" onclick="event.stopPropagation();toggleFiltroGeralPainel('${uid}')" title="Filtrar por data" style="background:rgba(255,255,255,.15);margin-right:2px;"><i class="ti ti-filter" style="font-size:12px;"></i></button>`:'';
  return `<div class="rel-sec-wrap" id="sec-wrap-${uid}">
    <div class="rel-sec-hdr ${extraHdrClass||''}" onclick="toggleSecao('${bodyId}','${uid}')">
      <i class="ti ${icon} rsh-icon"></i>
      <span class="rsh-label">${titulo}</span>
      ${filtroBtnHtml}
      <input type="checkbox" class="rel-sec-chk no-print" id="${chkId}" checked onclick="event.stopPropagation();toggleChkSecao('${uid}')" title="Incluir na impressão">
      <button class="rel-sec-toggle no-print" id="sec-btn-${uid}">−</button>
    </div>
    <div class="rel-sec-body" id="${bodyId}">${body}</div>
  </div>`;
}

function toggleFiltroGeralPainel(uid){
  // Abre o painel do histórico se estiver fechado, e mostra/esconde o filtro geral
  const bodyId='sec-body-'+uid;
  const body=document.getElementById(bodyId);
  const btn=document.getElementById('sec-btn-'+uid);
  // Garante que o histórico está aberto
  if(body&&body.classList.contains('recolhido')){
    body.classList.remove('recolhido');
    if(btn)btn.textContent='−';
  }
  // Mostra/esconde o painel de filtro geral (primeiro filho do body)
  const filtro=document.getElementById('filtro-geral-hist');
  if(filtro){
    const open=filtro.style.display==='none'||filtro.style.display==='';
    filtro.style.display=open?'block':'none';
    const fBtn=document.getElementById('sec-filtro-'+uid);
    if(fBtn)fBtn.style.background=open?'rgba(255,255,255,.35)':'rgba(255,255,255,.15)';
  }
}

function toggleUssRelFicha(){
  const body=document.getElementById('uss-ficha-body');
  const btn=document.getElementById('uss-ficha-btn');
  if(!body)return;
  const open=body.style.display==='none';
  body.style.display=open?'block':'none';
  if(btn)btn.textContent=open?'−':'+';
}

function toggleUssSubTrecho(uid){
  const body=document.getElementById(uid);
  const btn=document.getElementById(uid+'-btn');
  if(!body)return;
  const open=body.style.display==='none';
  body.style.display=open?'block':'none';

}

function toggleUssRel(uid){
  const el=document.getElementById(uid);
  const btn=document.getElementById(uid+'-btn');
  if(!el)return;
  const open=el.style.display==='none';
  el.style.display=open?'block':'none';

}
function toggleSecao(bodyId,uid){
  const el=document.getElementById(bodyId);
  const btn=document.getElementById('sec-btn-'+uid);
  if(!el)return;
  const recolhido=el.classList.toggle('recolhido');
  if(btn)btn.textContent=recolhido?'+':'−';
}

function toggleChkSecao(uid){
  // quando desmarca seção, desmarca todos itens dentro dela
  const chk=document.getElementById('sec-chk-'+uid);
  const wrap=document.getElementById('sec-wrap-'+uid);
  if(!wrap)return;
  const itensChk=wrap.querySelectorAll('.item-print-chk');
  itensChk.forEach(c=>c.checked=chk.checked);
}

  const vals=[];for(let i=0;i<21;i++)vals.push(document.getElementById('uss-'+i)?.value||'');

  marcarMudanca(); autoBackup();

const stMap={em:'Acompanhando',ac:'Acompanhando',co:'Concluído',enc:'Encerrado'};
const stCls={em:'status-ac',ac:'status-ac',co:'status-co',enc:'status-enc'};

function buildRegCard(r,isHist){
  let extras='';
  const isRaspK=r.tipo&&r.tipo.startsWith('rasp-');

  if(isRaspK){
    const v=r.campos||{};
    if(v.pct||v.crit){
      const pn=parseInt(v.pct)||0;
      const dcor=pn<=30?'#C62828':pn<=50?'#E65100':pn<=75?'#F9A825':'#2E7D32';
      const dlbl=pn<=30?'Crítico':pn<=50?'Alto':pn<=75?'Médio':'Bom';
      extras=`<div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:6px;align-items:center;">
        ${v.pct?`<span class="pill" style="background:${dcor}20;color:${dcor};border:1px solid ${dcor}40;">${v.pct}% — ${dlbl}</span>`:''}
        ${v.pct?`<div style="flex:1;min-width:60px;background:#E5E8ED;border-radius:4px;height:8px;overflow:hidden;"><div style="height:100%;width:${Math.min(pn,100)}%;background:${dcor};border-radius:4px;"></div></div>`:''}
        ${v.crit?`<span class="pill pill-vn">${v.crit}</span>`:''}
      </div>`;
    }
    if(r.fotos&&r.fotos.length) extras+=buildGaleriaDisplay(r.fotos,'rr-'+r.id);
  }
  else if(r.tipo==='rasp'){
    // registros antigos agrupados (legado)
    extras='<div style="margin-top:7px;">';
    Object.entries(r.campos||{}).forEach(([k,v])=>{
      extras+=`<div style="background:#fff;border:1px solid #E5E8ED;border-radius:7px;padding:8px;margin-bottom:6px;">
        <div style="font-size:11px;font-weight:700;color:#1F3864;margin-bottom:4px;">${RASP_LABELS[k]||k}</div>
        <div style="font-size:12px;color:#374151;">${v.desc==='Sem relato'?'<span style="color:#9CA3AF;font-style:italic;">Sem relato</span>':v.desc||''}</div>
        <div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:5px;">
          ${v.pct?`<span class="pill pill-neu">${v.pct}% desgaste</span>`:''}
          ${v.crit?`<span class="pill pill-vn">${v.crit}</span>`:''}
        </div>

      // Monta timeline
      let timelineH='';

        timelineH='<div class="def-timeline">';

          const stDot={em:'dot-em',ac:'dot-ac',co:'dot-co'}[u.status]||'dot-new';

          timelineH+=`<div class="def-tl-item">

                    ${u.crit?`<span class="pill pill-vn" style="font-size:10px;">${u.crit}</span>`:''}

                  <button class="btn-sm btn-sm-sec" style="font-size:10px;padding:3px 6px;" onclick="editarAtualizacao('${r.id}',${i},${ui})"><i class="ti ti-edit" style="font-size:10px;"></i></button>

      const stAcAtivo=dSt!=='co';
      const stCoAtivo=dSt==='co';
      extras+=`<div style="background:#fff;border:1px solid #E5E8ED;border-radius:10px;padding:10px;margin-bottom:8px;" id="def-bloco-${r.id}-${i}">
        <div style="display:flex;align-items:center;flex-wrap:wrap;gap:6px;margin-bottom:8px;">
          <span style="font-size:12px;font-weight:700;color:#1F3864;">Defeito${i>0?' #'+(i+1):''}</span>

            <button style="background:none;border:none;padding:0;cursor:pointer;font-size:12px;font-weight:${stAcAtivo?700:400};color:${stAcAtivo?'#1565C0':'#9CA3AF'};opacity:${stAcAtivo?1:.45};" onclick="confirmarMudaStatusDefeito('${r.id}',${i},'ac')">Acompanhando</button>
